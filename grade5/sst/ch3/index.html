<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 5 EVS: Landform Architect Lab</title>
    <style>
        :root {
            --crust-dark: #0f0c08;
            --mantle-panel: #221a12;
            --accent-gold: #e5a93c;
            --river-blue: #2980b9;
            --grass-green: #27ae60;
            --text-light: #f5f0ea;
            --success-glow: #2ecc71;
            --error-glow: #e74c3c;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--crust-dark);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }

        /* 5-SECOND FLASHING SPLASH SCREEN WITH LOGO ONLY */
        #splashScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 0.5s ease-in 4.8s forwards;
        }

        .splash-logo {
            max-width: 280px;
            height: auto;
            animation: pulseGlow 1.6s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.97); opacity: 0.8; }
            50% { transform: scale(1.03); opacity: 1; filter: drop-shadow(0 0 20px rgba(229,169,60,0.5)); }
            100% { transform: scale(0.97); opacity: 0.8; }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        header {
            background: linear-gradient(180deg, #19130e, transparent);
            width: 100%;
            text-align: center;
            padding: 15px 0;
            border-bottom: 2px solid #2d2218;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .game-wrapper {
            display: flex;
            width: 95vw;
            max-width: 1300px;
            height: calc(100vh - 120px);
            margin: 15px 0;
            gap: 20px;
        }

        .visualizer-zone {
            flex: 1.2;
            background: #080604;
            border: 3px solid #3d2e20;
            border-radius: 12px;
            position: relative;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.9);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .interaction-zone {
            flex: 1;
            background: var(--mantle-panel);
            border: 2px solid #473625;
            border-radius: 12px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .module-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #3d2e20;
            padding-bottom: 10px;
        }

        .badge {
            background: #14100b;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #54412e;
            font-size: 13px;
            color: var(--accent-gold);
            font-weight: bold;
        }

        .narrative-box {
            background: rgba(0, 0, 0, 0.35);
            border-left: 4px solid var(--accent-gold);
            padding: 14px;
            border-radius: 4px;
            font-size: 14px;
            line-height: 1.5;
            margin: 12px 0;
        }

        .drag-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-grow: 1;
            justify-content: center;
        }

        .drop-target-slot {
            background: #14100b;
            border: 2px dashed #614a34;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            color: #ab9681;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            min-height: 50px;
        }

        .drop-target-slot.hovered {
            background: #2a1f14;
            border-color: var(--accent-gold);
            color: #fff;
            transform: scale(1.01);
        }

        .cards-deck {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            min-height: 80px;
            flex-wrap: wrap;
        }

        .draggable-card {
            background: linear-gradient(135deg, #523e2b, #382a1d);
            border: 1px solid #7a5f45;
            color: var(--text-light);
            padding: 12px 18px;
            border-radius: 6px;
            cursor: grab;
            font-weight: 600;
            font-size: 13px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            transition: transform 0.2s, border-color 0.2s;
        }

        .draggable-card:hover {
            border-color: var(--accent-gold);
        }

        .draggable-card:active {
            cursor: grabbing;
            transform: scale(0.96);
        }

        .next-btn {
            background: var(--accent-gold);
            color: #000;
            border: none;
            padding: 12px 35px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            display: none;
            align-self: flex-end;
            box-shadow: 0 4px 15px rgba(229,169,60,0.4);
            transition: transform 0.2s;
        }

        .next-btn:hover {
            transform: scale(1.04);
        }

        .end-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 25px;
            text-align: center;
        }

        .score-display {
            font-size: 56px;
            font-weight: bold;
            color: var(--accent-gold);
            text-shadow: 0 0 15px rgba(229,169,60,0.3);
        }
    </style>
</head>
<body>

    <div id="splashScreen">
        <img src="assets/innovine-logo.png" alt="Innovine Logo" class="splash-logo">
    </div>

    <header>
        <h1>Earth's Landform Architect Laboratory</h1>
    </header>

    <div class="game-wrapper">
        <div class="visualizer-zone">
            <canvas id="geologyCanvas" width="720" height="520"></canvas>
        </div>

        <div class="interaction-zone" id="playZone">
            <div class="module-header">
                <span id="stageLabel" style="font-weight: bold; color: #c4b09c; font-size: 14px;">Geographical Workspace</span>
                <span class="badge" id="counterLabel">Task 1 of 14</span>
            </div>

            <div class="narrative-box" id="caseDescription">Loading case environment...</div>

            <div class="drag-container">
                <div class="drop-target-slot" id="targetSlot" ondragover="allowDrop(event)" ondragleave="handleLeave(event)" ondrop="handleDrop(event)">
                    Drop the corresponding target classification card here...
                </div>
                <div class="cards-deck" id="cardsPile">
                    </div>
            </div>

            <button class="next-btn" id="nextBtn" onclick="advanceStage()">Next Analysis Phase ➡️</button>
        </div>

        <div class="interaction-zone" id="finishZone" style="display: none;">
            <div class="end-screen">
                <h2>🌍 Geological Evaluation Finalized!</h2>
                <div class="score-display" id="finalScore">0 / 14</div>
                <p id="evaluationPhrase" style="font-size: 15px; max-width: 400px; line-height: 1.5;"></p>
                <button class="draggable-card" style="cursor: pointer; width: 220px; padding: 15px;" onclick="restartGame()">Re-Initialize Diagnostics</button>
            </div>
        </div>
    </div>

    <audio id="audioCorrect" src="assets/correct.mp3" preload="auto"></audio>
    <audio id="audioWrong" src="assets/wrong.mp3" preload="auto"></audio>
    <audio id="audioApplause" src="assets/freesound_community-claps-44774.mp3" preload="auto"></audio>

    <script>
        const canvas = document.getElementById('geologyCanvas');
        const ctx = canvas.getContext('2d');

        // Dynamic Engine State Metrics
        let currentStage = 0;
        let successfulMatches = 0;
        let activeVisualMode = "crust_ratio";
        let engineTicks = 0;

        // 14-Task Dataset with corrected Task 1 options
        const landformStages = [
            {
                narrative: "Umesh looks out of the window during his flight and notices how much of the planet's total crust space is occupied by deep water pools compared to dry ground.",
                instruction: "Identify the absolute coverage balance of Earth's surface space:",
                cardValue: "70% Water, 30% Land",
                distractor: "40% Water, 60% Land",
                visual: "crust_ratio"
            },
            {
                narrative: "Massive open aquatic reservoirs like the Indian Ocean contain highly concentrated salt levels and are the largest water bodies on Earth.",
                instruction: "Classify this specific macro category of global water systems:",
                cardValue: "Oceans",
                distractor: "Freshwater Lakes",
                visual: "ocean"
            },
            {
                narrative: "The sun beats down heavily on rock walls in central India's Vindhya Range. Sudden daytime heat followed by freezing nights makes the outer rock layers crack and crumble down.",
                instruction: "What process breaks rocks down into fragments without changing their chemical structure?",
                cardValue: "Physical Weathering",
                distractor: "Chemical Deposition",
                visual: "weathering"
            },
            {
                narrative: "Fast-moving water streams cut through loose dirt banks along the upper path of the Ganga, actively picking up and lifting heavy sediments into the current.",
                instruction: "Identify the dynamic force that moves soil from one location to another:",
                cardValue: "Erosion",
                distractor: "Denudation",
                visual: "erosion"
            },
            {
                narrative: "Over millions of years, the Aravalli Hills in Rajasthan have steadily shrunk and lost their sharp peak outlines due to the combined action of weathering and erosion.",
                instruction: "Identify the overall wearing away and lowering of the Earth's surface layers:",
                cardValue: "Denudation",
                distractor: "Tectonic Uplift",
                visual: "denudation"
            },
            {
                narrative: "Slowing river paths hit the flat plains of Northern India. Losing their speed, they drop all their carried mud and silt to form the fertile Indo-Gangetic farmlands.",
                instruction: "What structural process drops carried materials into a new location?",
                cardValue: "Deposition",
                distractor: "Weathering",
                visual: "deposition"
            },
            {
                narrative: "Deep fold movements push structural tectonic plates together. The crust buckles under pressure, creating towering peaks like the Himalayas.",
                instruction: "Classify this tall landform category which acts as a major storehouse of fresh river glaciers:",
                cardValue: "Mountains",
                distractor: "Plateaus",
                visual: "mountains"
            },
            {
                narrative: "Wide, flat plains run across hundreds of kilometers in Northern India. They offer rich, fertile soil, perfect transport routes, and easy conditions for building large cities.",
                instruction: "Identify this structural landform category where crops like wheat and rice thrive:",
                cardValue: "Plains",
                distractor: "Plateaus",
                visual: "plains"
            },
            {
                narrative: "The Chhota Nagpur region stands high above its surrounding areas, featuring flat, raised land. It provides a massive storehouse of minerals like iron ore and coal.",
                instruction: "Identify this flat-topped, raised landform that is often rich in minerals:",
                cardValue: "Plateaus",
                distractor: "Valleys",
                visual: "plateau"
            },
            {
                narrative: "Between the high, steep walls of mountain ranges, low areas of land form. These pathways are often carved out and shaped over long periods by winding rivers.",
                instruction: "What low landform area lies between hills or mountains, like the famous Kashmir Valley?",
                cardValue: "Valleys",
                distractor: "Plains",
                visual: "valleys"
            },
            {
                narrative: "The Thar region in Rajasthan experiences negligible rainfall, blistering afternoon heat, and shifting fields of sand dunes where cacti and camels live.",
                instruction: "What category best defines this dry, sand-dominated landscape?",
                cardValue: "Deserts",
                distractor: "Valleys",
                visual: "deserts"
            },
            {
                narrative: "Long, flowing channels of fresh water collect snowmelt from mountain peaks and carry it down across plains to satisfy the needs of millions of people.",
                instruction: "Identify this freshwater delivery system:",
                cardValue: "Rivers",
                distractor: "Seas",
                visual: "rivers"
            },
            {
                narrative: "Ocean waves continuously crash against the shoreline of Goa, grinding pebbles down to line the coast with vast stretches of golden sand.",
                instruction: "Identify this specific landform created where land meets the sea:",
                cardValue: "Beaches",
                distractor: "Deltas",
                visual: "beaches"
            },
            {
                narrative: "Deep in the Pacific Ocean, a unique peak structure has its base on the ocean floor and rises high up through the water column, standing even taller than Mount Everest from base to peak.",
                instruction: "Identify the specific mountain structure that remains partially submerged underwater:",
                cardValue: "Mauna Kea",
                distractor: "Mount Everest",
                visual: "underwater"
            }
        ];

        function initiateStage() {
            document.getElementById('nextBtn').style.display = 'none';
            let stageData = landformStages[currentStage];
            activeVisualMode = stageData.visual;

            document.getElementById('counterLabel').innerText = `Task ${currentStage + 1} of 14`;
            document.getElementById('caseDescription').innerHTML = `<strong>Context:</strong> ${stageData.narrative}<br><br><em style="color:#e5a93c;">${stageData.instruction}</em>`;

            let dropSlot = document.getElementById('targetSlot');
            dropSlot.className = "drop-target-slot";
            dropSlot.style.background = "#14100b";
            dropSlot.style.borderColor = "#614a34";
            dropSlot.innerText = "Drop the corresponding target classification card here...";

            let cardsPile = document.getElementById('cardsPile');
            cardsPile.innerHTML = "";

            let choices = [stageData.cardValue, stageData.distractor];
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(val => {
                let card = document.createElement('div');
                card.className = "draggable-card";
                card.innerText = val;
                card.draggable = true;
                card.id = "card_" + Math.random().toString(36).substr(2, 5);
                card.ondragstart = (e) => e.dataTransfer.setData("text/plain", val + "||" + card.id);
                cardsPile.appendChild(card);
            });
        }

        function allowDrop(e) { e.preventDefault(); e.currentTarget.classList.add('hovered'); }
        function handleLeave(e) { e.currentTarget.classList.remove('hovered'); }

        function handleDrop(e) {
            e.preventDefault();
            let dropSlot = e.currentTarget;
            dropSlot.classList.remove('hovered');

            let rawData = e.dataTransfer.getData("text/plain");
            if(!rawData || !rawData.includes("||")) return;

            let [cardValue, cardId] = rawData.split("||");
            let stageData = landformStages[currentStage];

            if(cardValue === stageData.cardValue) {
                dropSlot.style.background = "#184022";
                dropSlot.style.borderColor = varProps('--success-glow');
                dropSlot.innerText = "⚡ VERIFIED ACCURATE: " + cardValue;
                successfulMatches++;
                document.getElementById('audioCorrect').play().catch(()=>{});
                let cardEl = document.getElementById(cardId);
                if(cardEl) cardEl.remove();
                document.getElementById('nextBtn').style.display = 'block';
            } else {
                dropSlot.style.background = "#541612";
                dropSlot.style.borderColor = varProps('--error-glow');
                dropSlot.innerText = "❌ ANOMALY DETECTED: Recalibrate Choice!";
                document.getElementById('audioWrong').play().catch(()=>{});
                setTimeout(() => {
                    if(document.getElementById('nextBtn').style.display !== 'block') {
                        dropSlot.style.background = "#14100b";
                        dropSlot.style.borderColor = "#614a34";
                        dropSlot.innerText = "Drop the corresponding target classification card here...";
                    }
                }, 1400);
            }
        }

        function advanceStage() {
            currentStage++;
            if(currentStage < landformStages.length) {
                initiateStage();
            } else {
                document.getElementById('playZone').style.display = 'none';
                document.getElementById('finishZone').style.display = 'flex';
                document.getElementById('finalScore').innerText = `${successfulMatches} / 14`;
                activeVisualMode = "end";

                let message = "";
                if(successfulMatches >= 12) {
                    message = "Elite Planetary Architect Rank Conferred! You have mastered weathering, deposition dynamics, and India's physical geography.";
                    document.getElementById('audioApplause').play().catch(()=>{});
                } else if(successfulMatches >= 8) {
                    message = "Good geographical evaluation score. Review the processes of erosion and denudation to achieve a flawless run.";
                } else {
                    message = "Re-examine the landforms summary dataset regarding mountain glacial water systems and tectonic plateau features.";
                }
                document.getElementById('evaluationPhrase').innerText = message;
            }
        }

        function restartGame() {
            currentStage = 0;
            successfulMatches = 0;
            document.getElementById('finishZone').style.display = 'none';
            document.getElementById('playZone').style.display = 'flex';
            initiateStage();
        }

        // CANVAS RENDERING CORE ENGINE
        function runGraphicsEngine() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            engineTicks += 0.025;
            let w = canvas.width;
            let h = canvas.height;

            ctx.fillStyle = '#0a0805';
            ctx.fillRect(0, 0, w, h);

            switch(activeVisualMode) {
                case "crust_ratio":
                    ctx.fillStyle = '#1e1c1a';
                    ctx.beginPath();
                    ctx.arc(w/2, h/2 - 20, 110, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = varProps('--river-blue');
                    ctx.beginPath();
                    ctx.moveTo(w/2, h/2 - 20);
                    ctx.arc(w/2, h/2 - 20, 110, 0, Math.PI * 2 * 0.7);
                    ctx.fill();

                    ctx.fillStyle = '#b76e2e';
                    ctx.beginPath();
                    ctx.moveTo(w/2, h/2 - 20);
                    ctx.arc(w/2, h/2 - 20, 110, Math.PI * 2 * 0.7, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 15px sans-serif";
                    ctx.fillText("Global Planetary Surface Distribution Diagram", 40, 50);
                    ctx.fillStyle = varProps('--river-blue');
                    ctx.fillText("🔵 Oceanic Basin Workspace", 60, h - 50);
                    ctx.fillStyle = '#b76e2e';
                    ctx.fillText("🟫 Continental Landmass Crust", w - 320, h - 50);
                    break;

                case "ocean":
                    ctx.fillStyle = '#06131e';
                    ctx.fillRect(0, 0, w, h);
                    ctx.fillStyle = '#0b253a';
                    ctx.beginPath();
                    ctx.moveTo(0, h);
                    for(let x=0; x<=w; x+=20) {
                        let y = h - 180 + Math.sin(x*0.015 + engineTicks*2) * 15;
                        ctx.lineTo(x, y);
                    }
                    ctx.lineTo(w, h);
                    ctx.fill();

                    ctx.fillStyle = varProps('--river-blue');
                    ctx.beginPath();
                    ctx.moveTo(0, h);
                    for(let x=0; x<=w; x+=20) {
                        let y = h - 120 + Math.sin(x*0.02 - engineTicks*2.5) * 12;
                        ctx.lineTo(x, y);
                    }
                    ctx.lineTo(w, h);
                    ctx.fill();

                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 15px sans-serif";
                    ctx.fillText("Macro Marine Slipped Basin (Salty Deep Reservoir System)", 40, 50);
                    break;

                case "weathering":
                    ctx.fillStyle = '#423529';
                    ctx.beginPath();
                    ctx.moveTo(w/2 - 120, h - 80);
                    ctx.lineTo(w/2, 160);
                    ctx.lineTo(w/2 + 120, h - 80);
                    ctx.fill();

                    ctx.strokeStyle = '#120c08';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(w/2, 160);
                    ctx.lineTo(w/2 - 10, 270);
                    ctx.lineTo(w/2 + 25, 340);
                    ctx.lineTo(w/2 - 30, h - 80);
                    ctx.stroke();

                    ctx.fillStyle = varProps('--accent-gold');
                    ctx.font = "bold 15px sans-serif";
                    ctx.fillText("In-Situ Disintegration (Physical Weathering Fractures)", 40, 50);
                    break;

                case "erosion":
                    ctx.fillStyle = '#2c3e50';
                    ctx.beginPath();
                    ctx.moveTo(0, h);
                    ctx.lineTo(w/3, 200);
                    ctx.lineTo(w, h);
                    ctx.fill();

                    ctx.fillStyle = varProps('--river-blue');
                    ctx.beginPath();
                    ctx.moveTo(w/3, 200);
                    for(let i=0; i<30; i++) {
                        let targetY = 200 + (i * 12);
                        let targetX = w/3 + (i * 10) + Math.sin(engineTicks*4 + i) * 6;
                        ctx.lineTo(targetX, targetY);
                    }
                    ctx.lineTo(0, h);
                    ctx.fill();

                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 15px sans-serif";
                    ctx.fillText("Sediment Stripping Channel (Active Kinetic Erosion)", 40, 50);
                    break;

                case "denudation":
                    ctx.fillStyle = '#5c4d3c';
                    ctx.beginPath();
                    ctx.moveTo(50, h - 80);
                    ctx.quadraticCurveTo(w/2, 80, w - 50, h - 80);
                    ctx.fill();

                    ctx.fillStyle = '#3a3025';
                    ctx.beginPath();
                    ctx.moveTo(50, h - 80);
                    ctx.quadraticCurveTo(w/2, 260 + Math.sin(engineTicks)*5, w - 50, h - 80);
                    ctx.fill();

                    ctx.fillStyle = '#9c8167';
                    ctx.font = "bold 13px sans-serif";
                    ctx.fillText("------------- Original Peak Line Profile (Millions of Years Ago)", w/2 - 160, 130);
                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 15px sans-serif";
                    ctx.fillText("Denudation (Long-Term Lowering of Continental Surface)", 40, 50);
                    break;

                case "deposition":
                    ctx.fillStyle = '#1a334d';
                    ctx.fillRect(0, 0, w, h);

                    ctx.fillStyle = '#27ae60';
                    ctx.fillRect(0, h - 200, w, 200);

                    ctx.fillStyle = varProps('--river-blue');
                    for(let i=0; i<5; i++) {
                        ctx.beginPath();
                        ctx.moveTo(w/2, h - 200);
                        ctx.quadraticCurveTo(w/2 + (i*50) - 100, h - 100, (i * 160) + 40, h);
                        ctx.lineTo((i * 160) + 90, h);
                        ctx.quadraticCurveTo(w/2 + (i*50) - 80, h - 100, w/2 + 30, h - 200);
                        ctx.fill();
                    }

                    ctx.fillStyle = varProps('--accent-gold');
                    ctx.font = "bold 15px sans-serif";
                    ctx.fillText("Alluvial Fan Accumulation Matrix (River Silt Deposition)", 40, 50);
                    break;

                case "mountains":
                    ctx.fillStyle = '#2d3748';
                    ctx.beginPath();
                    ctx.moveTo(50, h - 60);
                    ctx.lineTo(250, 140);
                    ctx.lineTo(450, h - 60);
                    ctx.fill();

                    ctx.fillStyle = '#1a202c';
                    ctx.beginPath();
                    ctx.moveTo(300, h - 60);
                    ctx.lineTo(500, 100);
                    ctx.lineTo(700, h - 60);
                    ctx.fill();

                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.moveTo(250, 140);
                    ctx.lineTo(215, 190);
                    ctx.lineTo(285, 190);
                    ctx.fill();

                    ctx.beginPath();
                    ctx.moveTo(500, 100);
                    ctx.lineTo(460, 150);
                    ctx.lineTo(540, 150);
                    ctx.fill();

                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 15px sans-serif";
                    ctx.fillText("Tectonic Mountain Folding (Glacial Storehouse Matrix)", 40, 50);
                    break;

                case "plains":
                    ctx.fillStyle = '#2ecc71';
                    ctx.fillRect(0, h - 160, w, 160);
                    ctx.fillStyle = '#27ae60';
                    ctx.fillRect(0, h - 80, w, 80);

                    ctx.strokeStyle = '#7f8c8d';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(0, h - 40); ctx.lineTo(w, h - 40);
                    ctx.stroke();

                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 15px sans-serif";
                    ctx.fillText("Fertile Alluvial Flatlands (Optimal Human Settlement Zone)", 40, 50);
                    break;

                case "plateau":
                    ctx.fillStyle = '#5c4028';
                    ctx.beginPath();
                    ctx.moveTo(60, h - 70);
                    ctx.lineTo(160, 220);
                    ctx.lineTo(w - 160, 220);
                    ctx.lineTo(w - 60, h - 70);
                    ctx.fill();

                    ctx.fillStyle = '#3a2818';
                    ctx.fillRect(160, 220, w - 320, 25);

                    ctx.fillStyle = varProps('--accent-gold');
                    ctx.font = "bold 15px sans-serif";
                    ctx.fillText("Tableland Uplift (Mineral-Rich Basalt Trap Plateau)", 40, 50);
                    break;

                case "valleys":
                    ctx.fillStyle = '#4a5568';
                    ctx.fillRect(0, 0, w, h);

                    ctx.fillStyle = '#718096';
                    ctx.beginPath();
                    ctx.moveTo(0, 100); ctx.lineTo(w/2, h - 100); ctx.lineTo(0, h); ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(w, 100); ctx.lineTo(w/2, h - 100); ctx.lineTo(w, h); ctx.fill();

                    ctx.fillStyle = varProps('--river-blue');
                    ctx.beginPath();
                    ctx.moveTo(w/2 - 15, h - 100);
                    ctx.quadraticCurveTo(w/2 + 20, h - 50, w/2 - 40, h);
                    ctx.lineTo(w/2 + 30, h);
                    ctx.quadraticCurveTo(w/2 + 70, h - 50, w/2 + 25, h - 100);
                    ctx.fill();

                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 15px sans-serif";
                    ctx.fillText("Low Mountain Interspace (River Cut Valley Architecture)", 40, 50);
                    break;

                case "deserts":
                    ctx.fillStyle = '#f39c12';
                    ctx.fillRect(0, h - 180, w, 180);

                    ctx.fillStyle = '#f1c40f';
                    ctx.beginPath();
                    ctx.moveTo(0, h);
                    for(let x=0; x<=w; x+=30) {
                        let y = h - 140 + Math.sin(x*0.01 + engineTicks) * 20;
                        ctx.lineTo(x, y);
                    }
                    ctx.lineTo(w, h);
                    ctx.fill();

                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 15px sans-serif";
                    ctx.fillText("Arid Desert Zone (Wind Shuffled Sand Dune Matrix)", 40, 50);
                    break;

                case "rivers":
                    ctx.fillStyle = '#1e272c';
                    ctx.fillRect(0, 0, w, h);

                    ctx.fillStyle = varProps('--river-blue');
                    ctx.beginPath();
                    ctx.moveTo(0, h/2);
                    for(let x=0; x<=w; x+=20) {
                        let y = h/2 + Math.sin(x*0.02 + engineTicks*3) * 25;
                        ctx.lineTo(x, y);
                    }
                    ctx.lineTo(w, h);
                    ctx.lineTo(0, h);
                    ctx.fill();

                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 15px sans-serif";
                    ctx.fillText("Linear Freshwater Flow Channel System", 40, 50);
                    break;

                case "beaches":
                    ctx.fillStyle = '#f5dfbb';
                    ctx.fillRect(0, 0, w, h);

                    ctx.fillStyle = 'rgba(41, 128, 185, 0.6)';
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    let seaReach = w/2 + Math.sin(engineTicks*1.5) * 40;
                    ctx.lineTo(seaReach, 0);
                    ctx.quadraticCurveTo(seaReach - 30, h/2, seaReach + 20, h);
                    ctx.lineTo(0, h);
                    ctx.fill();

                    ctx.fillStyle = varProps('--accent-gold');
                    ctx.font = "bold 15px sans-serif";
                    ctx.fillText("Coastal Wave Aggregation Zone (Sanded Beach Shoreline)", 40, 50);
                    break;

                case "underwater":
                    ctx.fillStyle = '#020b14';
                    ctx.fillRect(0, 0, w, h);

                    ctx.strokeStyle = '#3498db';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(0, 140); ctx.lineTo(w, 140);
                    ctx.stroke();

                    ctx.fillStyle = '#231d18';
                    ctx.beginPath();
                    ctx.moveTo(100, h);
                    ctx.lineTo(w/2, 60);
                    ctx.lineTo(w - 100, h);
                    ctx.fill();

                    ctx.fillStyle = '#3498db';
                    ctx.font = "bold 12px sans-serif";
                    ctx.fillText("~~~~~~~~~~~~~~~~ WAVE OCEAN SURFACE LINE ~~~~~~~~~~~~~~~~", 40, 125);
                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 15px sans-serif";
                    ctx.fillText("Submerged Volcanic Mountain Profile (Base-to-Peak Scaling)", 40, 50);
                    break;

                case "end":
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, w, h);
                    ctx.fillStyle = varProps('--accent-gold');
                    ctx.font = "bold 22px sans-serif";
                    ctx.fillText("DIAGNOSTICS RECORDED COMPLETELY", w/2 - 190, h/2);
                    break;
            }

            requestAnimationFrame(runGraphicsEngine);
        }

        function varProps(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

        // Initialize components after the mandatory 5-second splash delay
        setTimeout(() => {
            initiateStage();
            runGraphicsEngine();
        }, 5000);
    </script>
</body>
</html>
