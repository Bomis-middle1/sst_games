<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 5 EVS Game: Our World Explorer</title>
    <style>
        :root {
            --space-bg: #0a0b10;
            --panel-bg: rgba(20, 24, 35, 0.95);
            --accent-gold: #ffd700;
            --text-light: #f0f4f8;
            --success-green: #2e7d32;
            --error-red: #c62828;
            --ui-blue: #3b4861;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--space-bg);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            background: linear-gradient(180deg, #141923, transparent);
            width: 100%;
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #222b3c;
            position: relative;
        }

        .logo {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            height: 40px;
        }

        h1 {
            margin: 0;
            font-size: 26px;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .game-container {
            display: flex;
            width: 95vw;
            max-width: 1300px;
            margin: 25px 0;
            gap: 25px;
        }

        .canvas-container {
            flex: 1.3;
            background: #000;
            border: 3px solid var(--ui-blue);
            border-radius: 16px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            overflow: hidden;
            height: 550px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .control-panel {
            flex: 1;
            background: var(--panel-bg);
            border: 2px solid #2d384e;
            border-radius: 16px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            height: 500px;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #2d384e;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .progress-badge {
            background: #1e2638;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            color: var(--accent-gold);
            border: 1px solid #44567a;
        }

        .case-box {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--accent-gold);
            padding: 15px;
            border-radius: 4px;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 15px;
            font-style: italic;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: #1e2638;
            color: white;
            border: 1px solid #3d4d6e;
            padding: 14px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            text-align: left;
            transition: all 0.25s ease;
        }

        .option-btn:hover:not([disabled]) {
            background: #2b3752;
            border-color: var(--accent-gold);
            transform: translateX(5px);
        }

        .option-btn[disabled] {
            cursor: not-allowed;
        }

        .action-container {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
        }

        .next-btn {
            background: var(--accent-gold);
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            transition: transform 0.2s;
        }

        .next-btn:hover {
            transform: scale(1.05);
        }

        .score-screen {
            text-align: center;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid var(--accent-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            color: var(--accent-gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }
    </style>
</head>
<body>

    <header>
        <img src="assets/innovine-logo.png" alt="Innovine Logo" class="logo" onerror="this.style.display='none'">
        <h1>Our World - 5th Grade Mission Control</h1>
    </header>

    <div class="game-container">
        <div class="canvas-container">
            <canvas id="worldCanvas" width="750" height="550"></canvas>
        </div>

        <div class="control-panel">
            <div id="quizActiveZone">
                <div class="quiz-header">
                    <span id="topicBadge" style="font-weight: bold; color: #a0aec0;">Module: Space Mechanics</span>
                    <span class="progress-badge" id="progressText">Question 1/10</span>
                </div>

                <div class="case-box" id="caseText">Loading case matrix context...</div>
                <div class="question-text" id="questionText">Loading query question context...</div>

                <div class="options-grid" id="optionsBlock">
                    </div>

                <div class="action-container">
                    <button class="next-btn" id="nextBtn" onclick="advanceQuestion()">Next Question ➡️</button>
                </div>
            </div>

            <div class="score-screen" id="scoreZone">
                <h2>🌍 Exploration Mission Accomplished!</h2>
                <div class="score-circle" id="scoreValue">0/10</div>
                <p id="feedbackStatement">Evaluating overall geographical navigation metrics...</p>
                <button class="option-btn" style="text-align: center;" onclick="resetMission()">Restart Flight Mission</button>
            </div>
        </div>
    </div>

    <audio id="sndCorrect" src="assets/correct.mp3" preload="auto"></audio>
    <audio id="sndWrong" src="assets/wrong.mp3" preload="auto"></audio>
    <audio id="sndApplause" src="assets/freesound_community-claps-44774.mp3" preload="auto"></audio>

    <script>
        const canvas = document.getElementById('worldCanvas');
        const ctx = canvas.getContext('2d');

        // Dynamic State Configuration Variables
        let currentQuestionIdx = 0;
        let runningScore = 0;
        let visualMode = "rotation"; 
        let internalEngineAngle = 0;
        let isAnswered = false;

        // Structured Array Matrix Container holding Case-Based Questions matching the specific learning outcomes
        const cbqDatabase = [
            {
                case: "An amateur astronomer observes a star pattern over a 6-hour period at night and notices the stars appear to migrate sequentially across the night sky.",
                question: "What primary hidden planetary movement directly induces this localized stellar migration phenomenon?",
                options: ["A) The linear orbit velocity of distant deep space star fields", "B) The rotation of the Earth turning upon its internal vertical axis", "C) The continuous rapid shrinking diameter of Earth's atmosphere", "D) Local solar gravity pulling neighboring galaxies inward"],
                correct: 1,
                visual: "rotation"
            },
            {
                case: "A cargo jet takes off from Washington D.C. in bright afternoon sunshine and arrives in New Delhi, India where local ground crews are working under floodlights in the dark.",
                question: "Why does India experience deep nighttime conditions while the United States is illuminated by daytime?",
                options: ["A) Clouds block all light entry from reaching Asia completely", "B) The Earth's rotation places India on the side facing away from the Sun", "C) India operates closer to deep polar ocean zones", "D) The Sun briefly shuts off its fusion energy generation cycle every 12 hours"],
                correct: 1,
                visual: "daynight"
            },
            {
                case: "Satellite telemetry tracks massive hurricane cloud walls spinning in counter-clockwise circles while migrating across wide expanses of open tropical ocean waves.",
                question: "Which rotational force outcome creates these curving storm systems and distinct planetary trade wind patterns?",
                options: ["A) Continuous heat generation inside deep core lava veins", "B) The Earth's rotational momentum turning underneath atmospheric paths", "C) Polar ice caps melting at accelerated seasonal speeds", "D) Magnetic interference generated by deep communications towers"],
                correct: 1,
                visual: "rotation"
            },
            {
                case: "A calendar system tracks a continuous extra 6-hour drift remainder over a clean 365-day block each time the planet finishes a single complete solar cycle run.",
                question: "How long does it take the Earth to complete one full revolution cycle around the Sun's orbital perimeter path?",
                options: ["A) Exactly 24 standard working hours", "B) Approximately 30 calendar days", "C) Roughly 365 days and 6 hours", "D) Exactly 100 days total"],
                correct: 2,
                visual: "revolution"
            },
            {
                case: "In June, scientific installations located on the frozen South Pole experience continuous darkness, while regions in the Northern Hemisphere enjoy long, hot summer days.",
                question: "What physical structural position explains the intense summer conditions in the Northern Hemisphere during June?",
                options: ["A) The North Pole is physically tilted toward the direct path of the Sun", "B) The Sun changes its spatial orbit altitude profile closer to Earth", "C) The Southern Hemisphere experiences sudden micro-volcanic action", "D) The Earth ceases all regular orbital movement during June"],
                correct: 0,
                visual: "seasons"
            },
            {
                case: "An expedition team records extreme heat indices matching $45^\circ\text{C}$ inside deep sand plains during the afternoon, followed by plummeting near-freezing temperatures immediately after sunset.",
                question: "Which ecosystem climate class matches this scenario based on the Sahara Desert geographic case model?",
                options: ["A) Freezing and volatile Polar Climate Zone", "B) Constant precipitation Tropical Rainforest Climate", "C) Dry Climate characterized by negligible moisture and thermal swings", "D) Moderate Temperate European Zone"],
                correct: 2,
                visual: "climate_dry"
            },
            {
                case: "Biologists monitoring canopy canals inside the deep Amazon basin record massive daily rain downpours combined with consistently high ambient heat indexes across all 12 calendar months.",
                question: "What planetary zone positioning dictates the warm and wet status profile of this iconic Tropical Climate region?",
                options: ["A) Close strategic proximity to the highly irradiated solar equator line", "B) Extended elevation placement directly inside polar wind networks", "C) Massive underground refrigeration structures built inside bedrock layers", "D) Extreme seasonal tilt variations shifting every two calendar weeks"],
                correct: 0,
                visual: "climate_tropical"
            },
            {
                case: "Architects visiting New Delhi look at the structural geometries of the highly visited Lotus Temple before researching historical architectural patterns across different regional capitals.",
                question: "By definition, what central role distinguishes a sovereign global nation's designated Capital City?",
                options: ["A) It must possess the highest physical mountain point inside the territory", "B) It acts as the primary administrative seat where government leaders sit and work", "C) It must possess a coastline with access to oceanic international shipping lanes", "D) It represents the single coldest point designated inside regional maps"],
                correct: 1,
                visual: "culture"
            },
            {
                case: "A cultural exchange festival showcases traditional tartan wool kilts from Scotland alongside vibrant, intricately pleated silk sarees worn by performers from India.",
                question: "What underlying global reality does this diverse display of traditional clothing and distinctive national costumes illustrate?",
                options: ["A) Industrial raw fabric material manufacturing constraints across regions", "B) Every independent global culture adapts unique traditional identity traits", "C) Uniform universal fashion directives issued across continental systems", "D) Random resource allocation choices determined without historic background context"],
                correct: 1,
                visual: "culture"
            },
            {
                case: "Every single year on August 15th, citizens gather across India while the Prime Minister hoists the tricolor national flag over the historic stone walls of the Red Fort in New Delhi.",
                question: "Which landmark historical achievement is honored during this specific national recurring cultural festival?",
                options: ["A) The adoption of the internal constitutional document rules in 1950", "B) India's historic achievement of freedom and total sovereignty in 1947", "C) The building foundation day of the central New Delhi capital municipality", "D) The global transition of structural weather tracks into Autumn months"],
                correct: 1,
                visual: "india"
            }
        ];

        // Core UI Management Functions
        function loadCurrentQuestion() {
            isAnswered = false;
            document.getElementById('nextBtn').style.display = 'none';
            
            let qData = cbqDatabase[currentQuestionIdx];
            visualMode = qData.visual;

            document.getElementById('progressText').innerText = `Question ${currentQuestionIdx + 1}/10`;
            document.getElementById('caseText').innerText = qData.case;
            document.getElementById('questionText').innerText = qData.question;

            // Dynamically alter sub-topic context labels
            if (currentQuestionIdx < 3) document.getElementById('topicBadge').innerText = "Module: Planetary Rotation Dynamics";
            else if (currentQuestionIdx < 5) document.getElementById('topicBadge').innerText = "Module: Solar Orbital Revolution";
            else if (currentQuestionIdx < 7) document.getElementById('topicBadge').innerText = "Module: Global Climatology Vectors";
            else document.getElementById('topicBadge').innerText = "Module: Global Geography & Human Culture";

            // Render option interface arrays
            let optionsBlock = document.getElementById('optionsBlock');
            optionsBlock.innerHTML = "";
            
            qData.options.forEach((optText, index) => {
                let btn = document.createElement('button');
                btn.className = "option-btn";
                btn.innerText = optText;
                btn.onclick = () => selectAnswer(index, btn);
                optionsBlock.appendChild(btn);
            });
        }

        function selectAnswer(chosenIdx, selectedBtn) {
            if (isAnswered) return; // Lock interactive changes after choice
            isAnswered = true;

            let qData = cbqDatabase[currentQuestionIdx];
            let allOptionBtns = document.getElementById('optionsBlock').getElementsByTagName('button');

            // Trigger proper audio asset audio loops depending on accuracy
            if (chosenIdx === qData.correct) {
                selectedBtn.style.background = varProps('--success-green');
                selectedBtn.style.borderColor = "#81c784";
                document.getElementById('sndCorrect').play().catch(()=>{});
                runningScore++;
            } else {
                selectedBtn.style.background = varProps('--error-red');
                selectedBtn.style.borderColor = "#e57373";
                allOptionBtns[qData.correct].style.background = varProps('--success-green');
                allOptionBtns[qData.correct].style.borderColor = "#81c784";
                document.getElementById('sndWrong').play().catch(()=>{});
            }

            // Disable further choice interactions across current set
            for (let btn of allOptionBtns) {
                btn.setAttribute('disabled', 'true');
            }

            // Reveal the Next Controller step button
            document.getElementById('nextBtn').style.display = 'block';
        }

        function advanceQuestion() {
            currentQuestionIdx++;
            if (currentQuestionIdx < cbqDatabase.length) {
                loadCurrentQuestion();
            } else {
                displayEndGameScoreboard();
            }
        }

        function displayEndGameScoreboard() {
            document.getElementById('quizActiveZone').style.display = 'none';
            let scoreZone = document.getElementById('scoreZone');
            scoreZone.style.display = 'flex';
            
            document.getElementById('scoreValue').innerText = `${runningScore}/10`;
            visualMode = "victory";

            let feedbackStr = "";
            if (runningScore >= 9) {
                feedbackStr = "Exceptional Performance! You are a master planetary navigator of cultures, climates, and rotation mechanics.";
                document.getElementById('sndApplause').play().catch(()=>{});
            } else if (runningScore >= 6) {
                feedbackStr = "Good work! You possess solid functional core geographical literacy.";
            } else {
                feedbackStr = "Review the core chapter text definitions regarding planetary axis vectors and try the exploration route again.";
            }
            document.getElementById('feedbackStatement').innerText = feedbackStr;
        }

        function resetMission() {
            currentQuestionIdx = 0;
            runningScore = 0;
            document.getElementById('scoreZone').style.display = 'none';
            document.getElementById('quizActiveZone').style.display = 'block';
            loadCurrentQuestion();
        }

        // Helper interface utility to pull hex values cleanly from variable trees
        function varProps(varName) {
            return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
        }


        // Graphical Real-Time Render Pipeline Engine
        function runGraphicsRenderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            internalEngineAngle += 0.008;

            // Space backdrop generation matrix
            ctx.fillStyle = '#030508';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            for(let i=0; i<40; i++) {
                let sx = (i * 123) % canvas.width;
                let sy = (i * 71) % canvas.height;
                ctx.fillRect(sx, sy, 1.5, 1.5);
            }

            let cx = canvas.width / 2;
            let cy = canvas.height / 2;

            switch(visualMode) {
                case "rotation":
                case "daynight":
                    // Dynamic render mode for Day vs Night axial mechanics
                    // Solar furnace anchor point
                    ctx.beginPath();
                    ctx.arc(80, cy, 50, 0, Math.PI * 2);
                    ctx.fillStyle = '#ff9900';
                    ctx.shadowColor = '#ff3300';
                    ctx.shadowBlur = 30;
                    ctx.fill();
                    ctx.shadowBlur = 0; // standard clear

                    // Planetary matrix coordinates
                    let ex = 500, ey = cy, er = 100;
                    
                    ctx.save();
                    ctx.translate(ex, ey);
                    ctx.rotate(23.5 * Math.PI / 180); // Strict axial tilt projection alignment

                    // Planet Water Base
                    ctx.beginPath();
                    ctx.arc(0, 0, er, 0, Math.PI * 2);
                    ctx.fillStyle = '#21618c';
                    ctx.fill();

                    // Landmass transformations tracking planetary rotation
                    ctx.fillStyle = '#27ae60';
                    for(let i = -1; i <= 1; i++) {
                        let dynamicX = ((internalEngineAngle * 40) % (er * 2)) - er + (i * er * 1.2);
                        if (Math.abs(dynamicX) < er - 15) {
                            ctx.beginPath();
                            ctx.arc(dynamicX, i * 25, 30 - Math.abs(i * 5), 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }

                    // Axis Line representation
                    ctx.strokeStyle = '#e74c3c';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(0, -er - 25);
                    ctx.lineTo(0, er + 25);
                    ctx.stroke();
                    ctx.restore();

                    // Translucent dark shadow mask representing night blocking exactly 50% opposite to illumination
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.beginPath();
                    ctx.arc(ex, ey, er, -Math.PI/2, Math.PI/2);
                    ctx.fill();

                    // Context UI descriptors
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 12px sans-serif';
                    ctx.fillText("☀️ INCOMING SUNLIGHT", 160, cy - 10);
                    ctx.fillText("DAY SYSTEM", ex - 80, ey - 120);
                    ctx.fillText("NIGHT SHADOW", ex + 15, ey - 120);
                    break;

                case "revolution":
                case "seasons":
                    // Central Sun orbital tracking framework
                    ctx.beginPath();
                    ctx.arc(cx, cy, 40, 0, Math.PI * 2);
                    ctx.fillStyle = '#f39c12';
                    ctx.fill();

                    // Draw clean line ellipse tracking standard orbit pathway
                    ctx.strokeStyle = '#2c3e50';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.ellipse(cx, cy, 240, 150, 0, 0, Math.PI * 2);
                    ctx.stroke();

                    // Locate planet positions matching orbital steps
                    let revX = cx + Math.cos(internalEngineAngle * 0.7) * 240;
                    let revY = cy + Math.sin(internalEngineAngle * 0.7) * 150;

                    ctx.beginPath();
                    ctx.arc(revX, revY, 20, 0, Math.PI * 2);
                    ctx.fillStyle = '#3498db';
                    ctx.fill();

                    ctx.fillStyle = '#f1c40f';
                    ctx.font = '13px sans-serif';
                    ctx.fillText("365.25 Day Orbit track pathway", cx - 90, cy - 180);
                    break;

                case "climate_dry":
                    // Render representation of dry arid desert terrain
                    ctx.fillStyle = '#edc9af';
                    ctx.fillRect(0, cy, canvas.width, cy);
                    // Sun silhouette
                    ctx.beginPath();
                    ctx.arc(cx, cy - 20, 70, 0, Math.PI, true);
                    ctx.fillStyle = '#f39c12';
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 16px sans-serif';
                    ctx.fillText("DRY CLIMATE ZONE: Extreme Thermal Variances", 50, 60);
                    break;

                case "climate_tropical":
                    // Render representation of tropical biome
                    ctx.fillStyle = '#196f3d';
                    ctx.fillRect(0, cy + 50, canvas.width, cy);
                    // Precipitation drop generation trails
                    ctx.strokeStyle = '#5dade2';
                    ctx.lineWidth = 2;
                    for(let i=0; i<15; i++) {
                        let rx = (i * 61) % canvas.width;
                        let ry = (internalEngineAngle * 200 + i * 37) % (cy + 50);
                        ctx.beginPath();
                        ctx.moveTo(rx, ry);
                        ctx.lineTo(rx - 3, ry + 15);
                        ctx.stroke();
                    }
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 16px sans-serif';
                    ctx.fillText("TROPICAL MONSOON BIOME: High Annual Heat & Rainfall", 50, 60);
                    break;

                case "culture":
                case "india":
                    // Visualization mode for world maps or international exploration themes
                    ctx.strokeStyle = '#34495e';
                    ctx.lineWidth = 1;
                    // Abstract stylistic representations of continental structures
                    ctx.fillStyle = '#2e4053';
                    ctx.beginPath();
                    ctx.arc(200, 200, 70, 0, Math.PI * 1.5);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(500, 350, 90, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = varProps('--accent-gold');
                    ctx.font = '15px sans-serif';
                    ctx.fillText("🌐 Global Human Traditions & Cultural Landmarks Map", 50, 60);
                    break;

                case "victory":
                    // Post-game celebratory geometric light lines wrapper
                    ctx.fillStyle = '#27ae60';
                    ctx.font = 'bold 24px sans-serif';
                    ctx.fillText("MISSION COMPLETE", cx - 120, cy);
                    break;
            }

            requestAnimationFrame(runGraphicsRenderLoop);
        }

        // Initialize Application Sequence Trigger
        loadCurrentQuestion();
        runGraphicsRenderLoop();
    </script>
</body>
</html>
