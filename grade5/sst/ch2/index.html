<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Tower: Our World Edition</title>
    <style>
        /* CSS resets and base styles */
        :root {
            --primary: #4A90E2;
            --secondary: #67B26F;
            --background: #111;
            --text-on-light: #333;
            --text-on-dark: #eee;
            --border: #444;
            --accent: #FFD700;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevent page scrolling */
            font-family: 'Poppins', sans-serif; /* A more game-like font */
            background-color: var(--background);
            color: var(--text-on-dark);
        }

        /* Standard Game Font - Using Poppins from Google Fonts for a modern, gamey feel */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        /* Utility classes */
        .hidden { display: none !important; }

        /* Main Game Layout */
        #game-interface {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        /* --- Global Header (Desktop) --- */
        #game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: linear-gradient(180deg, #222, #111);
            border-bottom: 2px solid var(--border);
            z-index: 100;
        }

        #game-logo {
            height: 40px;
            pointer-events: none;
        }

        #tower-progress-header {
            font-size: 1.1rem;
            color: var(--text-on-dark);
            font-weight: 600;
        }

        #current-floor-span {
            font-weight: 700;
            color: var(--accent);
        }

        #game-menu-btn {
            background: none;
            border: 2px solid var(--border);
            color: var(--text-on-dark);
            border-radius: 5px;
            padding: 5px 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #game-menu-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* --- Split Layout: Tower Left, Question Right --- */
        #split-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Left Side: Tower Building Canvas */
        #tower-section {
            flex: 1.5; /* Larger share for the main visual */
            position: relative;
            background: #222; /* Darker back for tower contrast */
            border-right: 2px solid var(--border);
            overflow: hidden;
        }

        #tower-canvas {
            display: flex;
            flex-direction: column-reverse; /* Build from bottom up */
            align-items: center;
            position: absolute;
            bottom: 20px; /* Start building a bit from the bottom edge */
            left: 50%;
            transform: translateX(-50%);
            width: 80%; /* Width of the tower */
            height: calc(100% - 40px); /* Height of the build area */
            transition: bottom 0.5s ease-out; /* Pan up on new floor */
        }

        .tower-base {
            width: 250px;
            height: 30px;
            background-color: #555;
            border: 2px solid #333;
            border-radius: 10px;
            margin-top: -5px; /* Offset for block connection */
            z-index: 50;
        }

        .tower-block {
            width: 200px;
            height: 50px;
            position: relative;
            background-color: #444; /* Placeholder color, set by JS */
            border: 2px solid #222;
            border-radius: 8px;
            transform: translateY(-200px); /* Start high for drop animation */
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Dynamic drop/bounce */
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* Trigger for adding the floor */
        .tower-block.add-floor {
            transform: translateY(0);
            opacity: 1;
        }

        .block-info-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.8rem;
            text-align: center;
            color: white;
            font-weight: 600;
            width: 90%;
            pointer-events: none;
        }

        /* --- Tower Milestone Markers (like "Climate Zone unlocked") --- */
        .milestone-marker {
            position: absolute;
            left: calc(100% + 10px);
            top: 0;
            background: rgba(var(--accent), 0.2);
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 5px;
            padding: 2px 5px;
            font-size: 0.7rem;
            width: max-content;
        }

        /* Right Side: Interactive Question Panel */
        #question-panel {
            flex: 1;
            padding: 40px;
            background: var(--text-on-dark);
            color: var(--text-on-light);
            display: flex;
            flex-direction: column;
            overflow-y: auto; /* Scrollable questions */
            z-index: 90;
        }

        /* Game Progress Bar (above question) */
        #progress-header {
            margin-bottom: 30px;
        }

        #progress-bar-container {
            width: 100%;
            height: 10px;
            background-color: #ddd;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #ccc;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 5px;
            transition: width 0.3s ease;
        }

        /* --- Question Elements --- */
        #question-text {
            font-size: 1.8rem;
            margin-bottom: 40px;
            color: var(--text-on-light);
            line-height: 1.4;
            font-weight: 700;
        }

        /* Special icons for question types */
        .question-icon {
            margin-right: 15px;
            vertical-align: middle;
            color: var(--primary);
        }

        /* --- Options Grid --- */
        #options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .option-card {
            background-color: white;
            border: 2px solid #ccc;
            padding: 25px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease-out;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        /* Desktop specific option hover effects */
        .option-card:not(.disabled):hover {
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(74,144,226,0.15);
            transform: translateY(-3px);
        }

        /* The invisible radio button for selection */
        .option-radio {
            display: none;
        }

        /* Visual cue for selection - the dot */
        .option-select-visual {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            border: 3px solid #ccc;
            margin-right: 20px;
            background-color: white;
            position: relative;
            transition: all 0.2s;
        }

        /* Styling for the dot when selected */
        .option-radio:checked + .option-card .option-select-visual::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background-color: var(--primary);
        }

        /* Disabled state after submitting */
        .option-card.disabled {
            cursor: default;
            opacity: 0.6;
        }

        /* --- Feedback Box (Correct/Wrong) --- */
        #feedback-box {
            position: fixed;
            top: 80px;
            right: 40px;
            padding: 20px 30px;
            border-radius: 8px;
            color: white;
            z-index: 1000;
            transform: translateY(-100%);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            font-weight: 600;
        }

        #feedback-box.show {
            transform: translateY(0);
            opacity: 1;
        }

        #feedback-box.correct {
            background-color: var(--secondary);
            border: 2px solid #fff;
        }

        #feedback-box.wrong {
            background-color: #E53935;
            border: 2px solid #fff;
        }

        /* Icons for feedback */
        .feedback-icon {
            font-size: 1.5rem;
            margin-right: 10px;
            vertical-align: middle;
        }

        /* --- Next Level Button (always visible, updates context) --- */
        #game-controls {
            display: flex;
            justify-content: flex-end;
            margin-top: auto;
            border-top: 2px solid #ccc;
            padding-top: 20px;
        }

        .game-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            position: relative;
            display: flex;
            align-items: center;
        }

        .next-floor-btn {
            background-color: var(--primary);
            color: white;
        }

        .next-floor-btn:not(.disabled):hover {
            background-color: #357ABD;
            transform: translateY(-2px);
        }

        .next-floor-btn.disabled {
            background-color: #ccc;
            cursor: default;
        }

        .next-floor-btn.ready {
            box-shadow: 0 0 15px rgba(74,144,226,0.6);
            animation: pulse-border 1s infinite;
        }

        /* Keyframes for the ready button pulse */
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(74,144,226,0.7); }
            70% { box-shadow: 0 0 15px 15px rgba(74,144,226,0); }
            100% { box-shadow: 0 0 0 0 rgba(74,144,226,0); }
        }

        /* Mobile specific adjustments: Stack the layout */
        @media (max-width: 768px) {
            #game-header {
                flex-wrap: wrap;
                padding: 5px;
            }

            #game-logo { height: 25px; margin-bottom: 5px; }

            #split-content { flex-direction: column; }

            #tower-section { flex: 0 0 200px; order: 2; border-right: none; border-top: 2px solid var(--border); overflow: hidden; }

            #tower-canvas { width: 90%; bottom: 10px; }

            #question-panel { flex: 1; order: 1; padding: 20px; min-height: calc(100vh - 200px - 50px); /* Height minus tower & header */ scrollbar-width: none; }

            #question-text { font-size: 1.4rem; margin-bottom: 20px; }

            #options-grid { grid-template-columns: 1fr; gap: 10px; }

            .option-card { padding: 15px; }

            #game-controls { position: relative; margin-top: 20px; border: none; padding-top: 0; display: block; text-align: center; }

            .game-btn { width: 100%; display: block; margin-top: 10px; }
        }

        /* --- Specific styles for True/False options --- */
        .option-true-visual {
            background-color: #C8E6C9; /* Soft green */
            color: #1B5E20; /* Dark green */
            font-weight: bold;
            font-size: 1.2rem;
        }

        .option-false-visual {
            background-color: #FFCDD2; /* Soft red */
            color: #B71C1C; /* Dark red */
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* The invisible radio, again */
        .option-radio.true-false:checked + .option-card .option-select-visual {
            background-color: #388E3C;
            border-color: #388E3C;
        }

        .option-radio.true-false:not(:checked) + .option-card .option-select-visual {
            background-color: #D32F2F;
            border-color: #D32F2F;
        }

        /* Style the select visual directly for T/F on smaller screens */
        @media (max-width: 768px) {
            .option-radio.true-false + .option-card .option-select-visual {
                border-radius: 5px;
                border: none;
                width: auto;
                height: auto;
                padding: 10px;
                margin: 0;
            }
        }

        /* Final Scene styles */
        #game-completed {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-on-dark);
            text-align: center;
        }

        #game-completed.show { display: flex; }

        #completed-logo { height: 100px; margin-bottom: 30px; animation: scale-in 0.5s ease-out; }

        @keyframes scale-in { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        #game-completed h1 { font-size: 3rem; color: var(--accent); margin-bottom: 20px; font-weight: 800; text-shadow: 0 0 10px var(--accent); }

        #final-score { font-size: 2rem; margin-bottom: 40px; }

        .score-correct { color: var(--secondary); font-weight: bold; }

        .game-over-btn { background-color: var(--primary); color: white; padding: 20px 40px; font-size: 1.5rem; }

    </style>
</head>

            background: #1a1a1a; /* Distinct from header */
            overflow: hidden;
            border-right: 2px solid var(--border);
        }

        /* The viewport area that anchors the bottom-up building */
        #tower-building-canvas {
            width: 100%;
            height: calc(100% - 40px); /* Leave room at top/bottom */
            position: absolute;
            bottom: 20px;
            left: 0;
            display: flex;
            flex-direction: column-reverse; /* Force building from bottom up */
            align-items: center;
            transition: bottom 0.5s ease-out; /* Create "pan up" effect when building */
        }

        /* The static Ground Level where construction begins */
        #tower-base {
            width: 260px;
            height: 35px;
            background-color: var(--tower-base-color);
            border: 3px solid #333;
            border-radius: 10px;
            margin-top: -8px; /* Offset for block connection visual */
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 50;
        }

        /* B. The Individual dynamic floor blocks */
        .tower-block {
            width: 210px;
            height: 55px;
            position: relative;
            background-color: #444; /* Baseline, set dynamically via JS */
            border: 2px solid #222;
            border-radius: 8px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.4);
            
            /* Start state for the animation - high and invisible */
            transform: translateY(-250px);
            opacity: 0;
            
            /* Bounce drop animation when added */
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        /* Final state of animation (added from JS) */
        .tower-block.added {
            transform: translateY(0);
            opacity: 1;
        }

        /* Information and graphics on each block */
        .block-info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
            width: 90%;
            pointer-events: none;
        }

        /* Block graphics based on milestone (e.g., world map on correct answers) */
        .added-block-icon {
            position: absolute;
            bottom: 5px;
            right: 8px;
            font-size: 1.2rem;
            opacity: 0.8;
        }

        /* C. The Interactive Question/Progress Panel (Right Side) */
        #question-panel {
            flex: 1;
            padding: 30px;
            background-color: var(--background-light);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            overflow-y: auto; /* Scrollable questions on desktop */
            position: relative;
        }

        /* Panel Header: Score, Progress Bar */
        #progress-header {
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Dynamic Score tracker */
        #current-score-text {
            font-size: 1.4rem;
            color: var(--text-dark);
            font-weight: 700;
        }

        /* Visual Progress bar container */
        #game-progress-bar-container {
            flex: 1;
            height: 12px;
            background-color: #eee;
            border-radius: 6px;
            border: 1px solid #ddd;
            overflow: hidden;
        }

        #game-progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            border-radius: 6px;
            transition: width 0.3s ease;
        }

        /* --- Question Display Elements --- */
        #current-question-container {
            margin-bottom: 40px;
        }

        #question-title {
            font-size: 1.9rem;
            margin-bottom: 35px;
            color: var(--text-dark);
            line-height: 1.4;
            font-weight: 700;
            position: relative;
            padding-left: 10px;
        }

        #question-title::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background-color: var(--primary);
            border-radius: 2px;
        }

        /* Special icons for question types (e.g., globe icon) */
        #question-icon {
            margin-right: 15px;
            vertical-align: middle;
            color: var(--primary);
        }

        /* The grid holding answer cards */
        #options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        /* Interactive Card for options */
        .option-card {
            background-color: white;
            border: 2px solid #ccc;
            padding: 25px;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease-out;
            display: flex;
            align-items: center;
            min-height: 80px;
        }

        /* Desktop interactions: Hover and Click */
        .option-card:not(.disabled):hover {
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(74,144,226,0.15);
            transform: translateY(-4px);
        }

        /* Active/Checked state (for radio selection visual) */
        .option-radio {
            display: none; /* Hide standard radio input */
        }

        /* Visual dot for selection */
        .option-select-visual {
            width: 25px; height: 25px;
            border-radius: 50%;
            border: 3px solid #ccc;
            margin-right: 20px;
            position: relative;
            background-color: white;
            transition: all 0.2s;
        }

        /* Dot fills when the invisible radio is checked */
        .option-radio:checked + .option-card .option-select-visual::after {
            content: '';
            position: absolute;
            top: 4px; left: 4px;
            width: 17px; height: 17px;
            border-radius: 50%;
            background-color: var(--primary);
        }

        /* Option visual formatting for True/False (e.g., green True visual) */
        .true-false-visual {
            font-weight: bold;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            width: auto; height: auto;
            padding: 5px 15px;
            color: #1B5E20; /* Dark green for true text */
        }

        .true-false-visual.false-visual {
            color: #B71C1C; /* Dark red for false text */
        }

        /* True/False selection visual changes (no dot) */
        .option-radio.true-false:checked + .option-card .true-false-visual {
            background-color: #388E3C; /* Bright green background on correct */
            color: white;
        }

        .option-radio.true-false:checked + .option-card .true-false-visual.false-visual {
            background-color: #D32F2F; /* Bright red background on wrong */
            color: white;
        }

        /* --- Submitting and Progressing --- */
        #controls-bar {
            margin-top: auto;
            padding-top: 25px;
            border-top: 2px solid #ccc;
            display: flex;
            justify-content: flex-end;
            position: sticky; /* Keep visible when scrolling on mobile */
            bottom: 0;
            background-color: var(--background-light);
            z-index: 80;
        }

        .game-btn {
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            font-size: 1.2rem;
            position: relative;
        }

        /* The Submit/Proceed Action Button */
        #submit-btn {
            background-color: var(--primary);
            color: white;
        }

        #submit-btn:not(.disabled):hover {
            background-color: var(--primary-hover);
        }

        #submit-btn.disabled {
            background-color: #ccc;
            cursor: default;
            opacity: 0.7;
        }

        /* When ready to proceed after feedback */
        #submit-btn.proceed-btn {
            background-color: var(--tower-base-color);
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            animation: pulse 1s infinite;
        }

        /* Feedback Toast Box (Visible only on feedback) */
        #feedback-toast {
            position: fixed;
            top: 90px;
            right: 40px;
            padding: 18px 30px;
            border-radius: 8px;
            color: white;
            z-index: 1000;
            transform: translateY(-100%);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            font-weight: 600;
        }

        #feedback-toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        #feedback-toast.correct {
            background-color: var(--success);
            border: 2px solid #fff;
        }

        #feedback-toast.wrong {
            background-color: var(--danger);
            border: 2px solid #fff;
        }

        /* Feedback Icons */
        .feedback-icon {
            font-size: 1.4rem;
            margin-right: 12px;
            vertical-align: middle;
        }

        /* --- 3. RESPONSIVE MEDIA QUERIES (Mobile and Tablets) --- */

        /* Stack Layout for Vertical Screens */
        @media (max-width: 768px) {
            #split-content {
                flex-direction: column; /* Stack Tower above Question on mobile */
            }

            /* Stacked Tower Panel */
            #tower-section {
                flex: 0 0 200px; /* Fixed height for the building canvas on mobile */
                order: 2; /* Tower below Question */
                border-right: none;
                border-top: 2px solid var(--border);
                overflow: hidden;
            }

            #tower-building-canvas {
                bottom: 10px; /* Anchored tighter */
                width: 90%;
            }

            .tower-block {
                width: 170px;
                height: 40px;
                font-size: 0.8rem;
            }

            /* Stacked Interaction Panel */
            #question-panel {
                flex: 1; /* Question/Options take remaining space */
                order: 1; /* Question above Tower */
                padding: 15px;
                min-height: calc(100vh - 200px - 70px); /* Fill screen minus tower and header */
                overflow-y: scroll;
            }

            #question-title {
                font-size: 1.5rem;
                margin-bottom: 25px;
            }

            #options-grid {
                grid-template-columns: 1fr; /* Single column options on mobile */
                gap: 10px;
            }

            .option-card {
                padding: 15px;
                min-height: auto;
            }

            #innovine-logo { height: 30px; }
            #tower-progress-info { font-size: 0.9rem; }

            /* Controls bar at bottom on mobile */
            #controls-bar {
                margin-top: 20px;
                display: block;
                text-align: center;
                border: none;
                padding-top: 10px;
                padding-bottom: 0px;
            }
            .game-btn { width: 100%; display: block; }
        }

        /* Animations keyframes */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(74,144,226,0.7); }
            70% { box-shadow: 0 0 15px 15px rgba(74,144,226,0); }
            100% { box-shadow: 0 0 0 0 rgba(74,144,226,0); }
        }

        /* Final Scene styles */
        #final-game-completed-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--text-light);
            padding: 20px;
        }

        #final-game-completed-screen.show { display: flex; }

        #completed-innovine-logo { height: 110px; margin-bottom: 30px; }

        #final-game-completed-screen h1 {
            font-size: 3.5rem;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
            margin-bottom: 20px;
        }

        #final-score-callout {
            font-size: 2.5rem;
            margin-bottom: 50px;
        }

        #final-score-correct { color: var(--success); font-weight: bold; }

    </style>
</head>
<body>

    <audio id="audioCorrect" preload="auto" src="assets/correct.mp3"></audio>
    <audio id="audioWrong" preload="auto" src="assets/wrong.mp3"></audio>
    <audio id="audioFinalCompleted" preload="auto" src="assets/freesound_community-claps-44774.mp3"></audio>

    <div id="game-interface">

        <header id="game-header">
            <img src="assets/innovine-logo.png" alt="Innovine Logo" id="innovine-logo">
            <div id="tower-progress-info">
                Height: <span id="current-floor-display" class="game-title-font">Ground Level</span>
            </div>
            <button class="game-btn game-title-font" id="menu-btn">Menu</button>
        </header>

        <main id="split-content">

            <section id="tower-section">
                <div id="tower-building-canvas">
                    <div id="tower-base"></div>
                </div>
            </section>

            <section id="question-panel">
                
                <div id="progress-header">
                    <div id="game-progress-bar-container">
                        <div id="game-progress-bar-fill"></div>
                    </div>
                    <div id="current-score-text" class="game-title-font">
                        Score: <span id="score-points">0</span> / <span id="max-points">20</span>
                    </div>
                </div>

                <div id="current-question-container">
                    <h1 id="question-title">
                        <span id="question-icon"></span>
                        <span id="question-text-title"></span>
                    </h1>
                    <div id="options-grid">
                        </div>
                </div>

                <footer id="controls-bar">
                    <button class="game-btn disabled" id="submit-btn" onclick="handleGameAction()">Submit</button>
                </footer>

                <div id="feedback-toast">
                    </div>
            </section>

        </main>
    </div>

    <div id="final-game-completed-screen">
        <img src="assets/innovine-logo.png" alt="Innovine Logo" id="completed-innovine-logo">
        <h1 class="game-title-font">Tower Complete! 🏆🌍</h1>
        <p id="final-score-callout" class="game-title-font">Your final score: <span id="final-score-correct"></span> / 20</p>
        <button class="game-btn" onclick="location.reload()">Build Another Tower?</button>
    </div>

    <script>
        // Data Structure for the Entire Chapter's Questions
        const chapterQuestions = [
            // --- Level 1-5: Fill in the Blanks ---
            { id: 1, floorName: "Direction Block", type: "blank", icon: "🌐", question: "The Earth rotates from the _______ to the _______ direction.", options: ["East", "West", "North", "South"], correct: [1, 0] },
            { id: 2, floorName: "Orbit Block", type: "blank", icon: "☀️", question: "The path the Earth follows around the Sun is called an _______. ", options: ["Orbit", "Axis", "Satellite", "Tide"], correct: [0] },
            { id: 3, floorName: "Equinox (March)", type: "blank", icon: "🌸", question: "In _______ the Northern Hemisphere experiences spring, and the Southern Hemisphere experiences autumn.", options: ["June", "December", "March", "September"], correct: [2] },
            { id: 4, floorName: "Sahara Zone", type: "blank", icon: "🏜️", question: "The Sahara Desert is an example of a _______ climate.", options: ["Tropical", "Dry", "Polar", "Temperate"], correct: [1] },
            { id: 5, floorName: "Brazil Capitol", type: "blank", icon: "🏢", question: "The capital of Brazil is ______.", options: ["Rio", "Sao Paulo", "Brasilia", "Buenos Aires"], correct: [2] },

            // --- Level 6-10: True or False ---
            { id: 6, floorName: "Rev. Truths", type: "tf", icon: "📅", question: "The Earth takes 365 days to complete one revolution around the Sun.", options: ["True", "False"], correct: "True" },
            { id: 7, floorName: "Scottish Myths", type: "tf", icon: "🏴󠁧󠁢󠁳󠁣󠁴󠁿", question: "Kilts are traditional clothing often worn in India.", options: ["True", "False"], correct: "False" },
            { id: 8, floorName: "Light Festival", type: "tf", icon: "🪔", question: "Diwali is a festival celebrated with lights and fireworks in India.", options: ["True", "False"], correct: "True" },
            { id: 9, floorName: "Golf Stream Mystery", type: "tf", icon: "🌊", question: "The Gulf Stream affects the weather in Europe by carrying warm water from the Gulf of Mexico.", options: ["True", "False"], correct: "True" },
            { id: 10, floorName: "Amazon Theory", type: "tf", icon: "🌴", question: "The Amazon Rainforest has a polar climate.", options: ["True", "False"], correct: "False" },

            // --- Level 11-15: MCQs ---
            { id: 11, floorName: "Day-Night Core", type: "mcq", icon: "🔄", question: "What does rotation of the Earth cause?", options: ["Seasons", "Day and Night", "Climate", "Tides"], correct: 1 },
            { id: 12, floorName: "Eiffel Landmark", type: "mcq", icon: "🗼", question: "Which city is known for the Eiffel Tower?", options: ["London", "Rome", "Paris", "Berlin"], correct: 2 },
            { id: 13, floorName: "Diwali Lights", type: "mcq", icon: "🪔", question: "Which festival is known as the festival of lights in India?", options: ["Holi", "Eid-ul-Fitr", "Diwali", "Christmas"], correct: 2 },
            { id: 14, floorName: "Tropical Amazon", type: "mcq", icon: "🌳", question: "What type of climate does the Amazon Rainforest have?", options: ["Dry", "Temperate", "Polar", "Tropical"], correct: 3 },
            { id: 15, floorName: "Tokyo Tower", type: "mcq", icon: "🇯🇵", question: "Which country’s capital is Tokyo?", options: ["China", "Japan", "South Korea", "Thailand"], correct: 1 },

            // --- Level 16-20: One Words / Special ---
            { id: 16, floorName: "D.C. Block", type: "mcq", icon: "🇺🇸", question: "Which of these is the capital of the United States?", options: ["New York City", "Washington, D.C.", "Los Angeles", "Chicago"], correct: 1 },
            { id: 17, floorName: "Axis Definition", type: "mcq", icon: "📍", question: "What do we call the Earth’s imaginary line it spins around?", options: ["Orbit", "Axis", "Equator", "Latitude"], correct: 1 },
            { id: 18, floorName: "Chinese New Year", type: "mcq", icon: "🐉", question: "Major festival celebrated with dragon dances in China:", options: ["Diwali", "Holi", "Chinese New Year", "Lantern Festival"], correct: 2 },
            { id: 19, floorName: "Dry Zone", type: "blank", icon: "🏜️", question: "Climate with very little rain, found in deserts: _______", options: ["Dry", "Wet", "Temperate", "Polar"], correct: [0] },
            { id: 20, floorName: "Saree Collection", type: "blank", icon: "👗", question: "Traditional Indian clothing often worn by women: _______", options: ["Turban", "Dhoti", "Saree", "Kilt"], correct: [2] }
        ];

        // Global Game States
        let currentLevel = 0; // index of chapterQuestions
        let score = 0;
        let builtFloors = 0;
        let selectedIndices = [];
        let submitted = false; // State to track if feedback is visible and ready to proceed

        // Visual constants for tower mechanics
        const TOWER_BLOCK_WIDTH = 210; //px
        const TOWER_BLOCK_HEIGHT = 55; //px
        const MOBILE_MAX_TOWER_BLOCKS = 3; // How many blocks stay visible on mobile viewport

        // --- CORE FUNCTIONS (Initialize & Gameplay Loop) ---

        function initGame() {
            // Setup base visual (progress header is static, JS loads first Q)
            document.getElementById('tower-progress-info').innerHTML = `Next Floor: <span id="current-floor-display" class="game-title-font">${chapterQuestions[0].floorName}</span>`;
            loadLevel(0);
        }

        // 1. Load Question and Options into UI
        function loadLevel(index) {
            submitted = false; // Reset submitted state for new question
            selectedIndices = []; // Reset visual selection
            const qData = chapterQuestions[index];

            // A. UPDATE PROGRESS & TEXT visuals
            document.getElementById('next-level-btn').innerText = "Submit";
            document.getElementById('next-level-btn').classList.remove('proceed-btn');
            document.getElementById('next-level-btn').classList.add('disabled');
            document.getElementById('feedback-toast').classList.remove('show', 'correct', 'wrong');

            // B. UPDATE PROGRESS filling bar
            const totalLevels = chapterQuestions.length;
            const progressPercent = (index / totalLevels * 100);
            document.getElementById('game-progress-bar-fill').style.width = progressPercent + '%';

            // C. UPDATE HEADER INFO visual
            document.getElementById('score-points').innerText = score;
            const currentFloorHeader = (builtFloors === 0) ? `Ground Level` : `Floor ${builtFloors}`;
            document.getElementById('current-floor-display').innerText = currentFloorHeader;
            if (builtFloors === totalLevels) { showGameCompleted(); return; }

            // D. UPDATE TEXTUAL Question
            document.getElementById('question-icon').innerText = qData.icon;
            document.getElementById('question-text-title').innerText = qData.question;

            // E. GENERATE OPTIONS visually
            const optionsGrid = document.getElementById('options-grid');
            optionsGrid.innerHTML = ''; // Clear existing options

            // Special handling for visual True/False buttons
            if (qData.type === 'tf') {
                qData.options.forEach((opt, idx) => {
                    const isFalse = (idx === 1);
                    const specialVisualClass = isFalse ? 'true-false-visual false-visual' : 'true-false-visual';
                    
                    const cardHTML = `
                        <input type="radio" name="game-option" id="tf-option-${idx}" class="option-radio true-false" onclick="selectOption(${idx}, true)">
                        <label for="tf-option-${idx}" class="option-card">
                            <div class="${specialVisualClass}">${opt.toUpperCase()}</div>
                        </label>
                    `;
                    optionsGrid.insertAdjacentHTML('beforeend', cardHTML);
                });
            } else {
                qData.options.forEach((opt, idx) => {
                    const cardHTML = `
                        <input type="radio" name="game-option" id="option-${idx}" class="option-radio" onclick="selectOption(${idx}, false)">
                        <label for="option-${idx}" class="option-card">
                            <div class="option-select-visual"></div>
                            <div class="option-text">${opt}</div>
                        </label>
                    `;
                    optionsGrid.insertAdjacentHTML('beforeend', cardHTML);
                });
            }
        }

        // 2. Handle Visual Selection on option tap
        function selectOption(index, isTFQuestion) {
            // T/F questions are single select only, visual state handles checked radio
            selectedIndices = [index];
            document.getElementById('next-level-btn').classList.remove('disabled');
        }

        // 3. Handle Game Logic Action (Submit vs Proceed)
        function handleGameAction() {
            if (document.getElementById('next-level-btn').classList.contains('disabled')) return;

            if (submitted) {
                proceedNext();
            } else {
                submitCurrentAnswer();
            }
        }

        // 4. SUBMIT: Validate answer, show visual feedback, update tower if correct
        function submitCurrentAnswer() {
            const qData = chapterQuestions[currentLevel];
            let isCorrect = false;

            // Mark as submitted so proceeding function can run on next tap
            submitted = true;
            document.getElementById('next-level-btn').innerText = "Next";
            document.getElementById('next-level-btn').classList.add('proceed-btn');

            // --- ANSWER VALIDATION ---
            if (qData.type === 'blank') {
                // If it's a fill blank, we validate all correct answers must be present in selected
                isCorrect = true;
                qData.correct.forEach(correctIdx => {
                    if (!selectedIndices.includes(correctIdx)) isCorrect = false;
                });
            } else if (qData.type === 'tf') {
                // Check if selected True (0) or False (1) matches correct string
                const selectedString = qData.options[selectedIndices[0]];
                isCorrect = (selectedString === qData.correct);
            } else if (qData.type === 'mcq') {
                // Single select check against index
                isCorrect = (selectedIndices[0] === qData.correct);
            }

            // --- VISUAL & AUDIO FEEDBACK ---
            const feedbackToast = document.getElementById('feedback-toast');
            
            if (isCorrect) {
                // Audio visual for correct answer
                playSound('audioCorrect');
                feedbackToast.innerHTML = '<span class="feedback-icon">🎉</span> Correct! You built Floor ' + (builtFloors + 1);
                feedbackToast.className = 'feedback-toast show correct';
                score++;
                
                // MAIN MECHANIC: BUILD TOWER only on correct answer
                addFloorBlockToTower(qData.floorName, builtFloors, qData.type === 'tf');
                builtFloors++;

            } else {
                // Audio visual for wrong answer
                playSound('audioWrong');
                let correctAnswerText = "";
                if (qData.type === 'blank') correctAnswerText = qData.correct.map(idx => qData.options[idx]).join(' & ');
                else if (qData.type === 'tf' || qData.type === 'mcq') correctAnswerText = qData.options[qData.type === 'tf' ? (qData.correct === 'True' ? 0 : 1) : qData.correct];
                feedbackToast.innerHTML = '<span class="feedback-icon">❌</span> Ouch! Correct was ' + correctAnswerText + '. Better luck next floor.';
                feedbackToast.className = 'feedback-toast show wrong';
            }
        }

        // 5. PROCEED: Load next level or game end
        function proceedNext() {
            currentLevel++;
            const totalQuestions = chapterQuestions.length;

            if (currentLevel < totalQuestions) {
                loadLevel(currentLevel);
                // Also update next floor info in header visual (if not game end)
                if (builtFloors < totalQuestions) {
                    document.getElementById('current-floor-display').innerText = (builtFloors === 0) ? `Ground Level` : `Floor ${builtFloors}`;
                }
            } else {
                showGameCompleted();
            }
        }

        // --- TOWER BUILDING VISUAL MECHANICS (Bottom-Up) ---

        // The specific mechanics: adds one floor at a time on correct answers
        function addFloorBlockToTower(name, floorNumber, isTFQuestion) {
            const towerCanvas = document.getElementById('tower-building-canvas');
            const totalFloors = chapterQuestions.length;

            // Generate Floor Block visually
            const blockId = `tower-block-${floorNumber}`;
            const floorColorIdx = floorNumber % 6;
            const floorBlockClass = isTFQuestion ? 'tower-block true-false-block' : 'tower-block';

            const blockHTML = `
                <div class="${floorBlockClass}" id="${blockId}" style="background-color: ${getTowerFloorColor(floorColorIdx)};">
                    <div class="block-info">
                        <div class="block-name">${name}</div>
                    </div>
                    <div class="added-block-icon">🌍</div>
                </div>
            `;
            // Add block at top (reversed in visual stack)
            towerCanvas.insertAdjacentHTML('beforeend', blockHTML);

            // Trigger visual DROP animation after slight delay
            currentBlockDropped = document.getElementById(blockId);
            setTimeout(() => {
                currentBlockDropped.classList.add('added');
            }, 100);

            // --- RESPONSIVE MECHANIC: VIEWPORT PANNING ---
            // On correct answers, visual tower pans UP (base pans down) to keep building area centered
            const windowWidth = window.innerWidth;
            if (windowWidth <= 768) {
                // Mobile Panning: anchors only the top few blocks
                if (builtFloors >= MOBILE_MAX_TOWER_BLOCKS) {
                    panTowerCanvasMobile();
                }
            } else {
                // Desktop Panning: Puts base in bottom few blocks on higher floor
                const visibleFloorsDesktop = Math.floor((window.innerHeight - 70 - 40) / TOWER_BLOCK_HEIGHT); // Header and Top Padding
                if (builtFloors >= Math.floor(visibleFloorsDesktop * 0.7)) {
                    panTowerCanvasDesktop();
                }
            }
        }

        // Utility: Desktop Panning
        function panTowerCanvasDesktop() {
            const towerBuildingCanvas = document.getElementById('tower-building-canvas');
            const visibleHeight = towerBuildingCanvas.offsetHeight;
            
            // Calculate current pan: 20px up initially
            const currentPan = builtFloors * TOWER_BLOCK_HEIGHT + 20;
            towerBuildingCanvas.style.bottom = '-' + (currentPan - (visibleHeight / 3)) + 'px'; // Base pans down by floor height
        }

        // Utility: Mobile Panning (locks base out, keeps tops in view)
        function panTowerCanvasMobile() {
            const towerBuildingCanvas = document.getElementById('tower-building-canvas');
            const towerSection = document.getElementById('tower-section');
            const towerHeight = towerBuildingCanvas.offsetHeight;
            towerBuildingCanvas.style.bottom = '-' + (towerHeight - (TOWER_BLOCK_HEIGHT * (MOBILE_MAX_TOWER_BLOCKS + 1))) + 'px';
        }

        // --- GAME END MECHANICS ---

        function showGameCompleted() {
            // Audio visual for completion claps
            playSound('audioFinalCompleted');
            document.getElementById('innovine-logo').className = "hidden";
            document.getElementById('innovine-logo').className = "hidden";

            document.getElementById('final-game-completed-screen').classList.add('show');
            document.getElementById('final-score-correct').innerText = score;
        }

        // --- UTILITIES ---

        function playSound(audioId) {
            const audio = document.getElementById(audioId);
            audio.currentTime = 0; // Rewind to start
            audio.play().catch(e => console.log("Audio play blocked", e));
        }

        // Function to toggle colors for a colorful tower
        function getTowerFloorColor(index) {
            const colors = ['#e17055', '#fdcb6e', '#00b894', '#0984e3', '#6c5ce7', '#d63031'];
            return colors[index];
        }

        // Initialize Game
        initGame();

    </script>
</body>
</html>
