<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chronicles of the Cosmos: World Explorer</title>
    <style>
        :root {
            --space-bg: #060713;
            --panel-bg: rgba(16, 20, 43, 0.85);
            --neon-blue: #00f3ff;
            --neon-green: #39ff14;
            --neon-pink: #ff007f;
            --text-light: #f0f4f8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&family=Rajdhani:wght@500;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--space-bg);
            color: var(--text-light);
            font-family: 'Rajdhani', sans-serif;
        }

        #space-canvas, #confetti-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }
        #space-canvas { z-index: 1; }
        #confetti-canvas { z-index: 1000; pointer-events: none; }

        #game-viewport {
            position: relative;
            z-index: 2;
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* --- LEFT PANEL: CONTROL DECK --- */
        #display-deck {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 2px solid var(--glass-border);
            background: radial-gradient(circle at 30% 50%, rgba(0, 243, 255, 0.08) 0%, transparent 60%);
        }

        #logo-container {
            position: absolute;
            top: 20px;
            left: 25px;
        }

        .innovine-fallback-logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.4rem;
            color: #fff;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* Pure CSS Holographic Grid Globe */
        #holo-planet-container {
            position: relative;
            width: 260px;
            height: 260px;
            margin-bottom: 30px;
        }

        .holo-planet {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #1a365d 0%, #0f172a 70%, #020617 100%);
            border: 2px solid var(--neon-blue);
            box-shadow: 
                inset 0 0 30px rgba(0, 243, 255, 0.6),
                0 0 40px rgba(0, 243, 255, 0.3);
            position: relative;
            overflow: hidden;
            transition: filter 0.6s ease;
        }

        /* Grid lines simulating continental map look */
        .holo-planet::before {
            content: '';
            position: absolute;
            width: 200%; height: 100%;
            top: 0; left: 0;
            background: 
                linear-gradient(rgba(0, 243, 255, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.15) 1px, transparent 1px);
            background-size: 20px 20px;
            animation: moveGrid 8s linear infinite;
        }

        @keyframes moveGrid {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .orbit-reticle {
            position: absolute;
            top: -15px; left: -15px; right: -15px; bottom: -15px;
            border: 1px dashed rgba(0, 243, 255, 0.4);
            border-radius: 50%;
            animation: spinReticle 20s linear infinite;
        }

        @keyframes spinReticle {
            100% { transform: rotate(360deg); }
        }

        #telemetry-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            color: var(--neon-blue);
            letter-spacing: 2px;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            text-transform: uppercase;
        }

        /* --- RIGHT PANEL: MISSION CONTROL --- */
        #mission-panel {
            flex: 1.2;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            padding: 40px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .mission-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
        }

        .mission-title-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            color: #fff;
        }

        .score-box {
            font-family: 'Orbitron', sans-serif;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid gold;
            color: gold;
            padding: 5px 15px;
            border-radius: 4px;
            font-weight: 900;
        }

        .case-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--neon-blue);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 1.05rem;
            line-height: 1.6;
            color: #cbd5e1;
        }

        .prompt-text {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 25px;
            color: #fff;
        }

        /* INTERACTIVES: MCQS */
        .grid-layout {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .space-option-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 16px 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.2s ease;
        }

        .space-option-card:hover {
            background: rgba(0, 243, 255, 0.05);
            border-color: var(--neon-blue);
        }

        .space-option-card.active {
            background: rgba(0, 243, 255, 0.12);
            border-color: var(--neon-blue);
            box-shadow: 0 0 12px rgba(0, 243, 255, 0.2);
        }

        .node-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.4);
            flex-shrink: 0;
        }

        .space-option-card.active .node-dot {
            border-color: var(--neon-blue);
            background: var(--neon-blue);
        }

        /* INTERACTIVES: MATCH DATA LISTS */
        .match-workspace {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .match-node-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.01);
            border: 1px solid var(--glass-border);
            padding: 14px 20px;
            border-radius: 8px;
            gap: 20px;
        }

        .match-left-item {
            font-size: 1.1rem;
            font-weight: 700;
            color: #e2e8f0;
        }

        .match-dropdown {
            background: #111424;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 15px;
            border-radius: 6px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            min-width: 170px;
        }

        /* ENGAGE SYSTEM TRIGGER */
        .deck-footer {
            margin-top: auto;
            padding-top: 20px;
        }

        .engage-btn {
            width: 100%;
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 900;
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s;
            text-shadow: 0 0 5px var(--neon-blue);
        }

        .engage-btn:hover:not(.locked) {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
            text-shadow: none;
        }

        .engage-btn.locked {
            border-color: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.2);
            text-shadow: none;
            cursor: not-allowed;
        }

        /* TOASTERS */
        #hud-toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5000;
        }
        #hud-toast.reveal { bottom: 40px; }
        #hud-toast.pass { background: rgba(57, 255, 20, 0.2); border: 2px solid var(--neon-green); color: var(--neon-green); }
        #hud-toast.fail { background: rgba(255, 0, 127, 0.2); border: 2px solid var(--neon-pink); color: var(--neon-pink); }

        /* RESPONSIVE RESPONSIVENESS SCALING */
        @media (max-width: 880px) {
            #game-viewport { flex-direction: column; }
            #display-deck { flex: 0 0 220px; border-right: none; border-bottom: 2px solid var(--glass-border); }
            #holo-planet-container { width: 120px; height: 120px; margin-bottom: 8px; margin-top: 20px;}
            #telemetry-display { font-size: 0.75rem; padding: 4px 12px; }
            #mission-panel { flex: 1; padding: 20px; }
            .prompt-text { font-size: 1.15rem; margin-bottom: 15px; }
            .case-card { padding: 12px; font-size: 0.95rem; margin-bottom: 12px; }
        }

        #debriefing-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #04050e;
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        #debriefing-screen.active { display: flex; }
        .debrief-title { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; color: var(--neon-blue); margin-bottom: 20px; }
    </style>
</head>
<body>

    <canvas id="space-canvas"></canvas>
    <canvas id="confetti-canvas"></canvas>

    <div id="game-viewport">
        <section id="display-deck">
            <div id="logo-container">
                <div class="innovine-fallback-logo">INNOVINE</div>
            </div>
            
            <div id="holo-planet-container">
                <div class="orbit-reticle"></div>
                <div id="main-planet" class="holo-planet"></div>
            </div>

            <div id="telemetry-display">GRID SCANNER ONLINE</div>
        </section>

        <section id="mission-panel">
            <div class="mission-header">
                <div class="mission-title-text" id="mission-index-string">COSMIC GRID SCAN: 1 / 5</div>
                <div class="score-box" id="score-readout">DATA CORES: 0</div>
            </div>

            <div class="case-card" id="case-viewport"></div>
            <h2 class="prompt-text" id="prompt-viewport"></h2>

            <div id="interactive-workspace"></div>

            <div class="deck-footer">
                <button id="engage-btn" class="engage-btn locked" onclick="evaluateCurrentScan()">ENGAGE SECTOR CAPTURE</button>
            </div>
        </section>
    </div>

    <div id="debriefing-screen">
        <h1 class="debrief-title">MISSION DEBRIEF COMPLETE</h1>
        <p style="font-size: 1.4rem; margin-bottom: 40px;" id="debrief-metrics-str"></p>
        <button class="engage-btn" style="width:auto; padding:15px 50px;" onclick="window.location.reload()">RE-LAUNCH SATELLITE</button>
    </div>

    <div id="hud-toast"></div>

    <script>
        const dataset = [
            {
                type: "cbq",
                case: "An interstellar spaceship matches the Earth's spin speed to hover in a stationary position above a launchpad. Sensors show the ground underneath moves steadily from left to right when looking northward.",
                prompt: "Determine the exact planetary rotation direction from space:",
                options: ["West to East direction", "East to West direction", "North to South vector", "South to Polar axis"],
                correct: 0,
                hueShift: 190,
                sector: "Sector Alpha-1"
            },
            {
                type: "matching",
                case: "Global exploration commands require configuring localized municipal capitals with their regional territories.",
                prompt: "Realign the administrative command nodes correctly:",
                pairs: [
                    { component: "France Command", options: ["Tokyo", "Brasilia", "Paris"], correct: "Paris" },
                    { component: "Brazil Command", options: ["Tokyo", "Brasilia", "Paris"], correct: "Brasilia" },
                    { component: "Japan Command", options: ["Tokyo", "Brasilia", "Paris"], correct: "Tokyo" }
                ],
                hueShift: 290,
                sector: "Sector Capital Matrix"
            },
            {
                type: "cbq",
                case: "Satellites observing an African subcontinent map out a massive zone covering millions of square kilometers where continuous moisture absence overrides forest capability, yielding extreme day heat variance.",
                prompt: "Classify this specific regional ecosystem blueprint:",
                options: ["Polar Tundra Climate", "Tropical Rain Climate", "Temperate Marine Climate", "Dry Desert Climate"],
                correct: 3,
                hueShift: 40,
                sector: "Sector Sahara Hotspot"
            },
            {
                type: "matching",
                case: "Human civilization adaptations across geographical matrices are highly visible through historic native attire selections.",
                prompt: "Formulate accurate pairings for the historical apparel databases:",
                pairs: [
                    { component: "Highland Kilt Garb", options: ["India", "Scotland", "Japan"], correct: "Scotland" },
                    { component: "Silk Saree Weave", options: ["India", "Scotland", "Japan"], correct: "India" },
                    { component: "Kimono Robe Design", options: ["India", "Scotland", "Japan"], correct: "Japan" }
                ],
                hueShift: 120,
                sector: "Sector Culture Matrix"
            },
            {
                type: "cbq",
                case: "Solar array diagnostic tracking charts show a precise geometric interception where the Earth’s rotational axis tilts neither toward nor directly away from the center star.",
                prompt: "Identify the astronomical phenomenon observed:",
                options: ["The Winter Solstice Matrix", "The Equinox Equilibrium", "The Apex Aphelion Cycle", "The Summer Solstice Inversion"],
                correct: 1,
                hueShift: 0,
                sector: "Sector Sol-Axis Alignment"
            }
        ];

        let indexPointer = 0;
        let gatheredCores = 0;
        let selectedNodeIndex = null;
        let stateLockout = false;

        function initCosmos() {
            renderStarfieldBackground();
            loadScanSequence();
        }

        function loadScanSequence() {
            stateLockout = false;
            selectedNodeIndex = null;
            
            const mainBtn = document.getElementById('engage-btn');
            mainBtn.innerText = "ENGAGE SECTOR CAPTURE";
            mainBtn.classList.add('locked');

            const activeData = dataset[indexPointer];

            document.getElementById('mission-index-string').innerText = `COSMIC GRID SCAN: ${indexPointer + 1} / ${dataset.length}`;
            document.getElementById('score-readout').innerText = `DATA CORES: ${gatheredCores}`;
            document.getElementById('case-viewport').innerText = activeData.case;
            document.getElementById('prompt-viewport').innerText = activeData.prompt;
            document.getElementById('telemetry-display').innerText = `SCANNING: ${activeData.sector}`;

            document.getElementById('main-planet').style.filter = `hue-rotate(${activeData.hueShift}deg) saturate(1.5)`;

            const workspace = document.getElementById('interactive-workspace');
            workspace.innerHTML = "";

            if (activeData.type === "cbq") {
                const wrap = document.createElement('div');
                wrap.className = "grid-layout";

                activeData.options.forEach((opt, idx) => {
                    const optionCard = document.createElement('div');
                    optionCard.className = "space-option-card";
                    optionCard.innerHTML = `<span class="node-dot"></span><span>${opt}</span>`;
                    optionCard.onclick = () => {
                        if (stateLockout) return;
                        document.querySelectorAll('.space-option-card').forEach(item => item.classList.remove('active'));
                        optionCard.classList.add('active');
                        selectedNodeIndex = idx;
                        mainBtn.classList.remove('locked');
                    };
                    wrap.appendChild(optionCard);
                });
                workspace.appendChild(wrap);

            } else if (activeData.type === "matching") {
                const space = document.createElement('div');
                space.className = "match-workspace";

                activeData.pairs.forEach((pair, idx) => {
                    const row = document.createElement('div');
                    row.className = "match-node-row";
                    row.innerHTML = `<div class="match-left-item">${pair.component}</div>`;

                    const menu = document.createElement('select');
                    menu.className = "match-dropdown";
                    menu.id = `drop-node-${idx}`;
                    menu.innerHTML = `<option value="" disabled selected>Link Destination...</option>`;
                    
                    pair.options.forEach(optStr => {
                        menu.innerHTML += `<option value="${optStr}">${optStr}</option>`;
                    });

                    menu.onchange = () => {
                        if (stateLockout) return;
                        evaluateDropdownsCompleteness();
                    };

                    row.appendChild(menu);
                    space.appendChild(row);
                });
                workspace.appendChild(space);
            }
        }

        function evaluateDropdownsCompleteness() {
            const currentItem = dataset[indexPointer];
            let valuesFilled = true;
            for (let i = 0; i < currentItem.pairs.length; i++) {
                if (!document.getElementById(`drop-node-${i}`).value) {
                    valuesFilled = false;
                    break;
                }
            }
            const btn = document.getElementById('engage-btn');
            if (valuesFilled) btn.classList.remove('locked');
            else btn.classList.add('locked');
        }

        function evaluateCurrentScan() {
            const btn = document.getElementById('engage-btn');
            if (btn.classList.contains('locked')) return;

            if (stateLockout) {
                indexPointer++;
                if (indexPointer < dataset.length) {
                    loadScanSequence();
                } else {
                    terminateMission();
                }
                return;
            }

            const currentData = dataset[indexPointer];
            let structurePassed = false;

            if (currentData.type === "cbq") {
                structurePassed = (selectedNodeIndex === currentData.correct);
            } else if (currentData.type === "matching") {
                structurePassed = true;
                for (let i = 0; i < currentData.pairs.length; i++) {
                    const userVal = document.getElementById(`drop-node-${i}`).value;
                    if (userVal !== currentData.pairs[i].correct) {
                        structurePassed = false;
                        break;
                    }
                }
            }

            stateLockout = true;
            btn.innerText = "CONTINUE TO NEXT MATRIX";

            if (structurePassed) {
                gatheredCores += 20;
                triggerNotification(true, "SECTOR SECURED // DATA EXTRACTION SUCCESSFUL");
                playLocalTone(600, "sine", 0.2); // Procedural audio bypass
                initConfettiBurst();
            } else {
                triggerNotification(false, "TRANSMISSION FAILURE // SIGNAL MISALIGNMENT DETECTED");
                playLocalTone(150, "sawtooth", 0.3);
            }
        }

        function triggerNotification(pass, payload) {
            const toast = document.getElementById('hud-toast');
            toast.innerText = payload;
            toast.className = `reveal ${pass ? 'pass' : 'fail'}`;
            setTimeout(() => { toast.classList.remove('reveal'); }, 2600);
        }

        // Offline Sound Synthesizer Engine (CORS Proof)
        function playLocalTone(freq, type, duration) {
            try {
                const ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctxAudio.createOscillator();
                const gain = ctxAudio.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctxAudio.currentTime);
                gain.gain.setValueAtTime(duration, ctxAudio.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, ctxAudio.currentTime + 0.4);
                osc.connect(gain);
                gain.connect(ctxAudio.destination);
                osc.start();
                osc.stop(ctxAudio.currentTime + 0.4);
            } catch(e) {}
        }

        function terminateMission() {
            document.getElementById('debrief-metrics-str').innerText = `Total Extracted Cores: ${gatheredCores} / 100 Data Blocks\nPlanetary Synchronicity Achieved.`;
            document.getElementById('debriefing-screen').classList.add('active');
        }

        // --- BACKGROUND STARFIELD ---
        function renderStarfieldBackground() {
            const cnv = document.getElementById('space-canvas');
            const c = cnv.getContext('2d');
            let systemStars = [];

            function setBounds() {
                cnv.width = window.innerWidth;
                cnv.height = window.innerHeight;
            }
            window.addEventListener('resize', setBounds);
            setBounds();

            for (let i = 0; i < 100; i++) {
                systemStars.push({
                    x: Math.random() * cnv.width,
                    y: Math.random() * cnv.height,
                    radius: Math.random() * 1.5,
                    alpha: Math.random(),
                    speed: Math.random() * 0.02 + 0.005
                });
            }

            function cycle() {
                c.clearRect(0, 0, cnv.width, cnv.height);
                c.fillStyle = '#060713';
                c.fillRect(0,0, cnv.width, cnv.height);

                systemStars.forEach(s => {
                    s.alpha += s.speed;
                    if (s.alpha > 1 || s.alpha < 0) s.speed = -s.speed;
                    c.beginPath();
                    c.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                    c.fillStyle = `rgba(255, 255, 255, ${Math.abs(s.alpha)})`;
                    c.fill();
                });
                requestAnimationFrame(cycle);
            }
            cycle();
        }

        // --- CONFETTI GRAPHICS ENGINE ---
        const confCanvas = document.getElementById('confetti-canvas');
        const confCtx = confCanvas.getContext('2d');
        let particles = [];

        function resizeConfettiCanvas() {
            confCanvas.width = window.innerWidth;
            confCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeConfettiCanvas);
        resizeConfettiCanvas();

        function initConfettiBurst() {
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: window.innerWidth / 2,
                    y: window.innerHeight / 2,
                    size: Math.random() * 6 + 4,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                    speedX: (Math.random() - 0.5) * 10,
                    speedY: (Math.random() - 0.7) * 12,
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 8
                });
            }
            animateConfetti();
        }

        function animateConfetti() {
            if (particles.length === 0) return;
            confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);

            particles.forEach((p, idx) => {
                p.x += p.speedX;
                p.y += p.speedY;
                p.speedY += 0.25; 
                p.rotation += p.rotationSpeed;

                confCtx.save();
                confCtx.translate(p.x, p.y);
                confCtx.rotate((p.rotation * Math.PI) / 180);
                confCtx.fillStyle = p.color;
                confCtx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                confCtx.restore();

                if (p.y > confCanvas.height) particles.splice(idx, 1);
            });

            requestAnimationFrame(animateConfetti);
        }

        window.onload = initCosmos;
    </script>
</body>
</html>
