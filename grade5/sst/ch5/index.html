<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Environment - Eco Puzzle Builder</title>
    <style>
        :root {
            --sky: #ebf8ff;
            --accent-blue: #3182ce;
            --accent-green: #38a169;
            --danger: #e53e3e;
            --text-dark: #2d3748;
            --border-color: #cbd5e0;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e6fffa 0%, #ebf8ff 100%);
            margin: 0;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* Pure White Minimalist Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease-out, visibility 0.6s;
        }

        .splash-logo {
            max-width: 260px;
            width: 80%;
            height: auto;
            animation: pulseLogo 2s ease-in-out infinite alternate;
        }

        /* Game Container */
        #game-wrapper {
            width: 100%;
            max-width: 760px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            border: 4px solid var(--border-color);
            padding: 20px;
            box-sizing: border-box;
            display: none;
            text-align: center;
        }

        .header-logo {
            max-height: 35px;
            margin-bottom: 10px;
        }

        /* HUD Tracker */
        .hud-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f7fafc;
            padding: 8px 15px;
            border-radius: 12px;
            border: 2px dashed var(--border-color);
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 0.95rem;
        }

        /* The Game Layout Grid */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 640px) {
            .main-layout {
                grid-template-columns: 1.1fr 0.9fr;
                align-items: center;
            }
        }

        /* Question Frame Box */
        .question-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }

        .clue-box {
            background: #f7fafc;
            border: 2px solid #edf2f7;
            border-radius: 14px;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            line-height: 1.4;
            min-height: 80px;
            display: flex;
            align-items: center;
        }

        /* Choice Buttons */
        .options-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .choice-btn {
            background: #ffffff;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
            box-shadow: 0 4px 0 var(--border-color);
            transition: all 0.1s ease;
            outline: none;
        }

        .choice-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 var(--border-color);
        }

        .choice-btn.correct-glow {
            background: #c6f6d5 !important;
            border-color: var(--accent-green) !important;
            color: #22543d !important;
            box-shadow: 0 4px 0 var(--accent-green) !important;
        }

        .choice-btn.wrong-glow {
            background: #fed7d7 !important;
            border-color: var(--danger) !important;
            color: #742a2a !important;
            box-shadow: 0 4px 0 var(--danger) !important;
        }

        /* Puzzle Canvas Panel */
        .puzzle-board-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .puzzle-canvas {
            width: 280px;
            height: 220px;
            background: #edf2f7;
            border: 4px dashed var(--accent-blue);
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(2, 1fr);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        /* Individual Puzzle Pieces */
        .puzzle-piece {
            background-image: url('https://picsum.photos/id/1025/560/440'); /* High quality nature fallback image */
            background-size: 280px 220px;
            opacity: 0;
            visibility: hidden;
            border: 0.5px solid rgba(255, 255, 255, 0.4);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            transform: scale(1.5) rotate(15deg);
        }

        .puzzle-piece.assembled {
            opacity: 1;
            visibility: visible;
            transform: scale(1) rotate(0deg);
        }

        /* End Reward Page Screen */
        #end-screen {
            display: none;
            padding: 25px 10px;
        }

        .score-banner {
            font-size: 3rem;
            font-weight: 900;
            color: var(--accent-green);
            margin: 15px 0;
        }

        .btn-restart {
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 14px 30px;
            font-size: 1.15rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #2b6cb0;
        }

        @keyframes pulseLogo {
            0% { transform: scale(0.95); opacity: 0.9; }
            100% { transform: scale(1.05); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="assets/innovine-logo.png" alt="Innovine" class="splash-logo">
    </div>

    <div id="game-wrapper">
        <img src="assets/innovine-logo.png" alt="Innovine" class="header-logo" onerror="this.style.display='none'">
        
        <div id="live-stage">
            <div class="hud-panel">
                <div id="hud-quest-no">Question: 1 / 10</div>
                <div id="hud-score">Pieces Unlocked: 🧩 0/10</div>
            </div>

            <div class="main-layout">
                <div class="question-container">
                    <div class="clue-box" id="clue-text-display">Loading Environment Question...</div>
                    <div class="options-column" id="choices-box-list">
                        </div>
                </div>

                <div class="puzzle-board-wrapper">
                    <h3 style="margin: 0 0 10px 0; font-size: 1.1rem; color: var(--accent-blue);">Build the Nature Image! 🖼️</h3>
                    <div class="puzzle-canvas" id="puzzle-grid-canvas">
                        <div class="puzzle-piece" id="piece-0" style="background-position: 0px 0px;"></div>
                        <div class="puzzle-piece" id="piece-1" style="background-position: -56px 0px;"></div>
                        <div class="puzzle-piece" id="piece-2" style="background-position: -112px 0px;"></div>
                        <div class="puzzle-piece" id="piece-3" style="background-position: -168px 0px;"></div>
                        <div class="puzzle-piece" id="piece-4" style="background-position: -224px 0px;"></div>
                        <div class="puzzle-piece" id="piece-5" style="background-position: 0px -110px;"></div>
                        <div class="puzzle-piece" id="piece-6" style="background-position: -56px -110px;"></div>
                        <div class="puzzle-piece" id="piece-7" style="background-position: -112px -110px;"></div>
                        <div class="puzzle-piece" id="piece-8" style="background-position: -168px -110px;"></div>
                        <div class="puzzle-piece" id="piece-9" style="background-position: -224px -110px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="end-screen">
            <div style="font-size: 5rem; margin-bottom: 5px;">🧩</div>
            <h1 style="color: var(--accent-blue);">Puzzle Assembled Perfectly!</h1>
            <p style="font-size: 1.15rem; color: #4a5568;">Fantastic job! You've successfully built the complete environment picture.</p>
            <div class="score-banner" id="final-score-value">10 / 10</div>
            <button class="btn-restart" onclick="window.location.reload()">Build Another Puzzle 🔄</button>
        </div>
    </div>

    <audio id="sound-correct" src="assets/correct.mp3" preload="auto"></audio>
    <audio id="sound-wrong" src="assets/wrong.mp3" preload="auto"></audio>
    <audio id="sound-win" src="assets/freesound_community-claps-4474.mp3" preload="auto"></audio>

    <script>
        // Curated 10-Question Environment Database Layout
        const chapterDataset = [
            { text: "What encompasses everything around us, including air, water, land, forests, and living beings?", answers: ["Environment 🌳", "Deforestation 🪓", "Factories 🏭", "Fossil Fuels ⛽"], correct: "Environment 🌳" },
            { text: "Which component of the atmosphere do plants capture to make food during photosynthesis?", answers: ["Oxygen 🌬️", "Carbon Dioxide 💨", "Nitrogen 💨", "Water Vapor 🌫️"], correct: "Carbon Dioxide 💨" },
            { text: "What is the general term for harmful or dirty substances making our nature unsafe or unhealthy?", answers: ["Ecosystem 🌿", "Biodiversity 🐾", "Pollution ⚠️", "Conservation 🛡️"], correct: "Pollution ⚠️" },
            { text: "What pollution variant comes from traffic horns, loud machinery, or public loudspeakers?", answers: ["Air Pollution 🏭", "Soil Pollution 🚜", "Noise Pollution 📢", "Water Pollution 🌊"], correct: "Noise Pollution 📢" },
            { text: "What types of resources can naturally replenish themselves in a short period of time?", answers: ["Renewable Resources ☀️", "Non-Renewable Resources 🪨", "Exhaustible Resources ⛽", "Minerals 🪙"], correct: "Renewable Resources ☀️" },
            { text: "Which choice represents an exhaustible non-renewable resource that takes millions of years to form?", answers: ["Wind Power 🍃", "Solar Energy ☀️", "Coal 🪨", "Water 💧"], correct: "Coal 🪨" },
            { text: "What special machines feature spinning blades used to capture clean, renewable wind energy?", answers: ["Solar Panels ☀️", "Wind Turbines 🍃", "Dams 🧱", "Pesticides 🧪"], correct: "Wind Turbines 🍃" },
            { text: "Using organic fertilizers and preventing chemical or industrial litter helps avoid what type of pollution?", answers: ["Noise Pollution 📢", "Water Pollution 🌊", "Soil Pollution 🌾", "Air Pollution 💨"], correct: "Soil Pollution 🌾" },
            { text: "Carrying cloth bags instead of disposable containers when shopping directly aims to reduce what waste material?", answers: ["Paper Waste 📄", "Plastic Waste 🛍️", "Glass Waste 🫙", "Organic Silt 🍂"], correct: "Plastic Waste 🛍️" },
            { text: "What cleanliness drive was introduced by the Prime Minister on October 2, 2014, to improve public hygiene?", answers: ["Namami Gange 🌊", "Project Tiger 🐅", "Swachh Bharat Abhiyan 🧹", "3R Conservation ♻️"], correct: "Swachh Bharat Abhiyan 🧹" }
        ];

        let questionIndex = 0;
        let rightAnswersCount = 0;
        let controlLockout = false;

        function triggerAudio(nodeId) {
            const player = document.getElementById(nodeId);
            if (player) {
                player.currentTime = 0;
                player.play().catch(() => {});
            }
        }

        // Strict 5-Second Splash Hold Page Screen Loop
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                document.getElementById('splash-screen').style.visibility = 'hidden';
                document.getElementById('game-wrapper').style.display = 'block';
                loadPuzzleStep();
            }, 5000);
        });

        function loadPuzzleStep() {
            controlLockout = false;
            const currentItem = chapterDataset[questionIndex];

            // Update UI HUD Text Fields
            document.getElementById('hud-quest-no').innerText = `Question: ${questionIndex + 1} / ${chapterDataset.length}`;
            document.getElementById('hud-score').innerText = `Pieces Unlocked: 🧩 ${rightAnswersCount}/10`;
            document.getElementById('clue-text-display').innerText = currentItem.text;

            // Render Shuffled Option Button Blocks
            const choicesContainer = document.getElementById('choices-box-list');
            choicesContainer.innerHTML = '';

            // Shuffle choice options array pattern
            let choicesList = [...currentItem.answers].sort(() => Math.random() - 0.5);

            choicesList.forEach(optionText => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = optionText;
                btn.onclick = () => evaluateOptionTap(btn, optionText, currentItem.correct);
                choicesContainer.appendChild(btn);
            });
        }

        function evaluateOptionTap(buttonElement, chosenText, correctText) {
            if (controlLockout) return;
            controlLockout = true;

            if (chosenText === correctText) {
                // Handle Correct Selection logic
                buttonElement.classList.add('correct-glow');
                triggerAudio('sound-correct');
                
                // Animate and reveal the specific matching piece number
                const piece = document.getElementById(`piece-${rightAnswersCount}`);
                if (piece) piece.classList.add('assembled');
                
                rightAnswersCount++;
            } else {
                // Handle Incorrect Selection logic
                buttonElement.classList.add('wrong-glow');
                triggerAudio('sound-wrong');

                // Find and highlight correct answer button for user guidance
                const buttons = document.querySelectorAll('.choice-btn');
                buttons.forEach(btn => {
                    if (btn.innerText === correctText) btn.classList.add('correct-glow');
                });
            }

            // Lock controls briefly before advancing to next item card
            setTimeout(() => {
                questionIndex++;
                if (questionIndex < chapterDataset.length) {
                    loadPuzzleStep();
                } else {
                    displayCompletionSummary();
                }
            }, 2500);
        }

        function displayCompletionSummary() {
            document.getElementById('live-stage').style.display = 'none';
            document.getElementById('end-screen').style.display = 'block';
            document.getElementById('final-score-value').innerText = `${rightAnswersCount} / 10 Pieces`;
            triggerAudio('sound-win');
        }
    </script>
</body>
</html>
