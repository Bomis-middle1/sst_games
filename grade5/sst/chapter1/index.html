<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Map Castle Escape Adventure</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Trebuchet MS,sans-serif}
body{background:linear-gradient(180deg,#0f172a,#1e3a8a);min-height:100vh;color:#fff;overflow-x:hidden}
.hidden{display:none!important}
#splash{position:fixed;inset:0;background:#fff;display:flex;justify-content:center;align-items:center;z-index:9999}
#splash img{max-width:320px;width:80%}
.container{max-width:1100px;margin:auto;padding:20px}
.topbar{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:15px}
.stat{background:#1e293b;padding:10px 15px;border-radius:12px}
.progress{height:18px;background:#334155;border-radius:999px;overflow:hidden}
.bar{height:100%;width:0;background:#22c55e}
.castle{background:rgba(255,255,255,.08);border-radius:20px;padding:20px;backdrop-filter:blur(4px)}
.scroll{background:#f5e6b3;color:#3b2f1a;padding:25px;border-radius:18px;margin:15px 0;text-align:center;box-shadow:0 8px 20px rgba(0,0,0,.3)}
.doors{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;margin-top:20px}
.door{height:220px;perspective:1000px;cursor:pointer}
.door-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:1s}
.door.open .door-inner{transform:rotateY(-75deg)}
.panel{position:absolute;inset:0;background:linear-gradient(#8b5a2b,#6b4423);border:6px solid #3b2412;border-radius:12px;display:flex;align-items:center;justify-content:center;text-align:center;padding:10px;font-weight:bold}
.feedback{margin-top:15px;padding:12px;border-radius:12px}
.good{background:#14532d}.bad{background:#7f1d1d}
button{padding:12px 20px;border:none;border-radius:10px;background:#22c55e;color:#fff;cursor:pointer}
.center{text-align:center}
</style>
</head>
<body>

<div id="splash"><img src="assets/innovine-logo.png"></div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<div id="intro" class="container hidden">
<div class="castle center">
<h1>🏰 Map Castle Escape Adventure</h1><br>
<p>Escape 10 rooms of the Ancient Geography Castle. Collect keys by opening the correct door.</p><br>
<button onclick="startGame()">Begin Adventure</button>
</div>
</div>

<div id="game" class="container hidden">
<div class="topbar">
<div class="stat">🏰 Room <span id="roomNum">1</span>/10</div>
<div class="stat">🔑 Keys: <span id="keys">0</span></div>
<div class="stat">⭐ Score: <span id="score">0</span></div>
</div>
<div class="progress"><div class="bar" id="bar"></div></div>

<div class="castle">
<div class="scroll">
<h2 id="title"></h2>
<p id="question"></p>
</div>
<div id="doors" class="doors"></div>
<div id="feedback"></div><br>
<button id="nextBtn" class="hidden" onclick="nextRoom()">Enter Next Room</button>
</div>
</div>

<div id="result" class="container hidden">
<div class="castle center">
<h1>🚪✨ THE FINAL GATE OPENS! ✨🚪</h1><br>
<h2 id="rank"></h2><br>
<h3 id="final"></h3><br>
<button onclick="location.reload()">Play Again</button>
</div>
</div>

<script>
setTimeout(()=>{splash.style.display='none';intro.classList.remove('hidden');},5000);

const rooms=[
{t:"Room 1",q:"Riya wants to see the true shape of Earth.",o:["Atlas","Globe","Calendar","Road Sign"],a:1},
{t:"Room 2",q:"Draw the route from classroom to playground.",o:["Globe","Map","Telescope","Compass Only"],a:1},
{t:"Room 3",q:"A globe breaks. What important feature is lost?",o:["Earth's spherical shape","Countries","Oceans","Continents"],a:0},
{t:"Room 4",q:"Library is directly right of school.",o:["North","South","East","West"],a:2},
{t:"Room 5",q:"Show where crops are grown in India.",o:["Political","Physical","Thematic","Road"],a:2},
{t:"Room 6",q:"Find north or south of Equator.",o:["Latitude","Longitude","Ocean","Scale"],a:0},
{t:"Room 7",q:"Mountains brown and rivers blue.",o:["Political","Physical","Weather","Railway"],a:1},
{t:"Room 8",q:"Meaning of map symbols?",o:["Compass","Scale","Legend/Key","Border"],a:2},
{t:"Room 9",q:"Latitude and longitude help find?",o:["Rainfall","Exact Location","Population","Roads"],a:1},
{t:"Room 10",q:"Need distance between cities.",o:["Symbol","Direction","Scale","Colour"],a:2}
];

let current=0,score=0,keysCollected=0,retry=0;

function startGame(){intro.classList.add('hidden');game.classList.remove('hidden');loadRoom();}

function loadRoom(){
retry=0;
roomNum.textContent=current+1;
title.textContent=rooms[current].t;
question.textContent=rooms[current].q;
bar.style.width=(current/rooms.length*100)+'%';
doors.innerHTML='';
feedback.innerHTML='';
nextBtn.classList.add('hidden');

rooms[current].o.forEach((txt,i)=>{
const d=document.createElement('div');
d.className='door';
d.innerHTML='<div class="door-inner"><div class="panel">🚪 '+txt+'</div></div>';
d.onclick=()=>choose(i,d);
doors.appendChild(d);
});
}

function choose(i,door){
if(i===rooms[current].a){
door.classList.add('open');
score++; keysCollected++;
scoreEl();
correctSound.play().catch(()=>{});
clapSound.play().catch(()=>{});
feedback.innerHTML='<div class="feedback good">🔑 Correct! The castle door swings open.</div>';
disableDoors();
nextBtn.classList.remove('hidden');
}else if(retry===0){
retry=1;
wrongSound.play().catch(()=>{});
feedback.innerHTML='<div class="feedback bad">🚫 Wrong door. One final attempt remains.</div>';
}else{
wrongSound.play().catch(()=>{});
feedback.innerHTML='<div class="feedback bad">The correct door was: '+rooms[current].o[rooms[current].a]+'</div>';
disableDoors();
nextBtn.classList.remove('hidden');
}
}

function disableDoors(){document.querySelectorAll('.door').forEach(x=>x.onclick=null);}

function scoreEl(){
score.textContent=score;
keys.textContent=keysCollected;
}

function nextRoom(){
current++;
if(current<rooms.length) loadRoom();
else finish();
}

function finish(){
game.classList.add('hidden');
result.classList.remove('hidden');
if(score>=9) rank.textContent='🏆 MASTER MAP EXPLORER';
else if(score>=6) rank.textContent='🧭 SMART NAVIGATOR';
else rank.textContent='🌎 YOUNG EXPLORER';
final.textContent='You escaped all 10 rooms with '+score+' keys collected!';
}
</script>
</body>
</html>
