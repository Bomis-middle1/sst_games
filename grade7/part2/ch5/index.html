<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronicles of Shelter - Decision Tree Adventure</title>
    <style>
        :root {
            --bg-dark: #0a0e17;
            --panel-bg: #141b2d;
            --accent-gold: #f59e0b;
            --accent-glow: rgba(245, 158, 11, 0.2);
            --mint-green: #10b981;
            --sky-blue: #3b82f6;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #242f47;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 20px 10px;
            user-select: none;
        }

        /* Fixed 5-Second Flash/Splash Screen with explicit White Background */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff !important;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.5s ease-out;
        }

        #splash-screen img {
            max-width: 260px;
            height: auto;
            margin-bottom: 25px;
        }

        #splash-screen .spinner {
            border: 4px solid #e2e8f0;
            border-top: 4px solid var(--accent-gold);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Core Game Wrapper Container */
        .game-shell {
            max-width: 850px;
            margin: 0 auto;
            background: var(--panel-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            display: none;
        }

        header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 25px;
            text-align: center;
            border-bottom: 2px solid var(--accent-gold);
        }

        header h1 {
            font-size: 24px;
            color: var(--accent-gold);
            letter-spacing: 0.5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 13.5px;
            margin-top: 4px;
        }

        .stats-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #090d16;
            padding: 12px 25px;
            font-size: 13px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
        }

        .score-badge {
            color: var(--mint-green);
            background: rgba(16, 185, 129, 0.1);
            padding: 4px 14px;
            border-radius: 20px;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .progress-container {
            background: #1e293b;
            height: 6px;
            width: 100%;
        }

        #progress-bar {
            background: var(--accent-gold);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }

        .node-body {
            padding: 30px;
        }

        .scenario-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 15.5px;
            line-height: 1.7;
        }

        .scenario-box em {
            color: var(--accent-gold);
            font-style: normal;
            font-weight: 600;
        }

        .historical-insight {
            background: rgba(59, 130, 246, 0.05);
            border-left: 4px solid var(--sky-blue);
            padding: 12px 15px;
            font-size: 13.5px;
            color: #93c5fd;
            border-radius: 0 4px 4px 0;
            margin-top: 15px;
            display: none;
        }

        .choices-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .choice-btn {
            background: #1e293b;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 15px 20px;
            border-radius: 6px;
            text-align: left;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .choice-btn:hover {
            background: #2d3d5a;
            border-color: var(--accent-gold);
            transform: translateX(4px);
        }

        .choice-btn span.bullet {
            background: var(--accent-gold);
            color: var(--bg-dark);
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            flex-shrink: 0;
        }

        .feedback-panel {
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
            margin-top: 20px;
            display: none;
            text-align: center;
            font-weight: 600;
        }

        .feedback-panel.success {
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .feedback-panel.error {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .action-bar {
            margin-top: 25px;
            display: flex;
            justify-content: flex-end;
        }

        .next-btn {
            background: var(--accent-gold);
            color: var(--bg-dark);
            border: none;
            padding: 12px 30px;
            font-size: 13.5px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-radius: 4px;
            cursor: pointer;
            display: none;
        }

        .next-btn:hover {
            background: #d97706;
        }

        .results-view {
            text-align: center;
            display: none;
            padding: 40px 20px;
        }

        .results-view h2 {
            color: var(--accent-gold);
            font-size: 26px;
            margin-bottom: 10px;
        }

        .results-view p {
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        .restart-btn {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--accent-gold);
            padding: 12px 30px;
            text-transform: uppercase;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .restart-btn:hover {
            background: var(--accent-gold);
            color: var(--bg-dark);
        }
    </style>
</head>
<body>

<!-- White Background Flash/Splash Screen Component -->
<div id="splash-screen">
    <img src="assets/innovine-logo.png" alt="Innovine Logo">
    <div class="spinner"></div>
</div>

<!-- Main UI Game Window Wrapper -->
<div class="game-shell" id="app-window">
    <header>
        <h1>From Distant Lands to Indian Shores</h1>
        <p>Interactive Decision Tree History Adventure</p>
    </header>

    <div class="stats-strip">
        <span id="current-era-label">ERA CHRONOLOGY</span>
        <span>CIVILISATIONAL HARMONY: <span id="score-counter" class="score-badge">0</span></span>
    </div>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <!-- Active Gameplay Layout -->
    <div id="play-arena" class="node-body">
        <div class="scenario-box">
            <p id="scenario-text"></p>
            <div id="insight-box" class="historical-insight"></div>
        </div>

        <div id="choices-container" class="choices-stack"></div>
        
        <div id="feedback-alert" class="feedback-panel"></div>

        <div class="action-bar">
            <button id="next-node-btn" class="next-btn" onclick="advanceTreePath()">Continue Timeline</button>
        </div>
    </div>

    <!-- Dynamic End Summary Results Component -->
    <div id="end-arena" class="node-body results-view">
        <h2>Journey of Inclusion Complete!</h2>
        <p id="final-summary-txt"></p>
        <button class="restart-btn" onclick="resetDecisionTree()">Restart Adventure</button>
    </div>
</div>

<script>
    // Audio configuration mapping nodes safely to correct folder paths
    const audioCorrect = new Audio('assets/correct.mp3');
    const audioWrong = new Audio('assets/wrong.mp3');
    const audioClaps = new Audio('assets/freesound_community-claps-44774.mp3');

    function triggerAudioNode(audioObject) {
        audioObject.currentTime = 0;
        audioObject.play().catch(() => console.log("Audio clip processed safely."));
    }

    // Comprehensive Historical Nodes Chapter Array
    const gameDecisionTree = [
        {
            era: "175 BCE — The Konkan Coast Wreck",
            text: "A fierce maritime storm wrecks your ship. You lose your holy books and belongings but successfully swim ashore onto the unfamiliar Konkan Coast. As a member of the early <em>Bene Israel</em> Jewish community, how do you preserve your distinct faith identity?",
            choices: [
                {
                    text: "Isolate completely from local villages to prevent outside contamination of ancestral prayers.",
                    points: 5,
                    insight: "Isolation creates suspicion. Historically, the Bene Israel adopted local Marathi language, apparel, and surnames, seamlessly blending in while faithfully observing the Sabbath on Friday evenings.",
                    correct: false
                },
                {
                    text: "Adopt local customs and Marathi tongue, but continue lighting holy lamps on Friday nights to observe the Sabbath.",
                    points: 20,
                    insight: "Correct! The Bene Israel adapted beautifully to Konkan culture while keeping their monotheistic identity intact for over two thousand years without holy books.",
                    correct: true
                }
            ]
        },
        {
            era: "800–1000 CE — Landing at Sanjan",
            text: "Fleeing religious pressures and the jizya tax in Persia, your group of Zoroastrians lands in Sanjan, Gujarat. King Jadav Rana presents you with a bowl of milk filled to the brim, indicating his kingdom is full. What is your response?",
            choices: [
                {
                    text: "Stir a spoonful of sugar into the milk to show you will sweeten the land without causing it to overflow.",
                    points: 20,
                    insight: "Correct! This classic gesture demonstrated that the Parsis would blend peacefully and enrich Indian culture like sugar in milk.",
                    correct: true
                },
                {
                    text: "Pour out a tiny amount of milk to demonstrate that space can always be cleared for a new community.",
                    points: 5,
                    insight: "Incorrect. Spilling the milk signifies a disruption or waste of the ruler's resources. The Parsis chose the peaceful and elegant approach of adding sugar.",
                    correct: false
                }
            ]
        },
        {
            era: "52 CE — The Malabar Coast Entrance",
            text: "You are navigating sea routes from West Asia to avoid Roman and Persian persecution of Christian traditions. You reach the Malabar Coast of Kerala. How does your community integrate into local society?",
            choices: [
                {
                    text: "Establish yourself as Syriac Christians, learning Malayalam and building schools while preserving your unique worship language.",
                    points: 20,
                    insight: "Correct! Syriac Christians integrated fully into Kerala's social fabric, becoming highly prominent while proudly maintaining ancient roots.",
                    correct: true
                },
                {
                    text: "Refuse to engage in local trade networks and demand extra-territorial rights from the rulers of Kochi.",
                    points: 5,
                    insight: "Incorrect. Hostile demands wouldn't align with local customs. Rulers offered protection willingly because traders arrived in peace and respected regional laws.",
                    correct: false
                }
            ]
        },
        {
            era: "16th Century — Prime Minister of Ahmednagar",
            text: "Born in Ethiopia, you were captured and brought to India through the complex systems of Indian Ocean enslavement. Armed with outstanding intelligence and military strategy, how do you defend the Deccan from Mughal invasion?",
            choices: [
                {
                    text: "Surrender immediately to Emperor Jahangir to protect your individual personal standing.",
                    points: 5,
                    insight: "Incorrect. Giving up would erase your strategic legacy. Historically, Malik Ambar rose to become Prime Minister and thwarted the Mughals repeatedly using brilliant guerrilla warfare.",
                    correct: false
                },
                {
                    text: "Organise elite structural revenue reforms and spearhead highly adaptive guerrilla warfare tactics to frustrate the Mughal army.",
                    points: 20,
                    insight: "Correct! Malik Ambar reformed governance and inspired generations of Deccan warriors through resilience and tactical genius.",
                    correct: true
                }
            ]
        },
        {
            era: "1942–1946 CE — Little Poland in Jamnagar",
            text: "During World War II, a ship filled with hundreds of stranded Polish orphan children is denied entry at Bombay ports by British governors. As Maharaja Digvijaysinhji of Nawanagar, what action do you take?",
            choices: [
                {
                    text: "Follow the British colonial directives strictly and turn the ships away to avoid diplomatic friction.",
                    points: 5,
                    insight: "Incorrect. This goes against the ethos of 'Atithi Devo Bhava'. The Maharaja stepped up courageously to welcome the children.",
                    correct: false
                },
                {
                    text: "Bypassing the British objections, welcome the 740 children, create a camp at Balachadi, and declare yourself as their 'Bapu'.",
                    points: 20,
                    insight: "Correct! The Good Maharaja provided shelter, safety, and education, creating a 'Little Poland' in Gujarat that is celebrated to this day.",
                    correct: true
                }
            ]
        }
    ];

    let currentStep = 0;
    let accumulatedScore = 0;

    // Fixed 5000ms Event Loop Display Configuration
    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            const splashLayer = document.getElementById('splash-screen');
            const mainApp = document.getElementById('app-window');
            splashLayer.style.opacity = '0';
            setTimeout(() => {
                splashLayer.style.display = 'none';
                mainApp.style.display = 'block';
                initTreeStructure();
            }, 500);
        }, 5000); // 5 Seconds Flash Boundary
    });

    function initTreeStructure() {
        currentStep = 0;
        accumulatedScore = 0;
        document.getElementById('end-arena').style.display = 'none';
        document.getElementById('play-arena').style.display = 'block';
        updateUIWorkspace();
    }

    function updateUIWorkspace() {
        if (currentStep >= gameDecisionTree.length) {
            concludeAdventure();
            return;
        }

        const currentNode = gameDecisionTree[currentStep];
        
        document.getElementById('current-era-label').textContent = `CURRENT ERA: ${currentNode.era}`;
        document.getElementById('scenario-text').innerHTML = currentNode.text;
        document.getElementById('score-counter').textContent = accumulatedScore;
        
        document.getElementById('insight-box').style.display = 'none';
        document.getElementById('feedback-alert').style.display = 'none';
        document.getElementById('next-node-btn').style.display = 'none';

        const progressPercentage = (currentStep / gameDecisionTree.length) * 100;
        document.getElementById('progress-bar').style.width = `${progressPercentage}%`;

        const choicesHolder = document.getElementById('choices-container');
        choicesHolder.innerHTML = '';

        currentNode.choices.forEach((choice, index) => {
            const button = document.createElement('button');
            button.className = 'choice-btn';
            button.onclick = () => registerUserChoice(index);
            
            const bullet = document.createElement('span');
            bullet.className = 'bullet';
            bullet.textContent = String.fromCharCode(65 + index);
            
            const textSpan = document.createElement('span');
            textSpan.textContent = choice.text;

            button.appendChild(bullet);
            button.appendChild(textSpan);
            choicesHolder.appendChild(button);
        });
    }

    function registerUserChoice(selectedIdx) {
        const currentNode = gameDecisionTree[currentStep];
        const selectedChoice = currentNode.choices[selectedIdx];
        
        const actionButtons = document.querySelectorAll('.choice-btn');
        actionButtons.forEach(btn => btn.style.pointerEvents = 'none');

        accumulatedScore += selectedChoice.points;
        document.getElementById('score-counter').textContent = accumulatedScore;

        const alertBox = document.getElementById('feedback-alert');
        const insightBox = document.getElementById('insight-box');

        insightBox.innerHTML = `<strong>Historical Insight:</strong> ${selectedChoice.insight}`;
        insightBox.style.display = 'block';

        if (selectedChoice.correct) {
            alertBox.className = "feedback-panel success";
            alertBox.textContent = "✨ Compassionate Choice! Your decision perfectly mirrors India's heritage of sanctuary and inclusion.";
            triggerAudioNode(audioCorrect);
        } else {
            alertBox.className = "feedback-panel error";
            alertBox.textContent = "⚠️ Historical Deviation! While safe, this choice does not reflect the values or outcomes that built these communities.";
            triggerAudioNode(audioWrong);
        }
        alertBox.style.display = 'block';
        document.getElementById('next-node-btn').style.display = 'inline-block';
    }

    function advanceTreePath() {
        currentStep++;
        updateUIWorkspace();
    }

    function concludeAdventure() {
        document.getElementById('progress-bar').style.width = '100%';
        document.getElementById('play-arena').style.display = 'none';
        
        const endScreen = document.getElementById('end-arena');
        const finalTxt = document.getElementById('final-summary-txt');
        endScreen.style.display = 'block';

        triggerAudioNode(audioClaps);

        if (accumulatedScore >= 80) {
            finalTxt.innerHTML = `Excellent! You scored <strong>${accumulatedScore} Harmony Points</strong>. You have fully internalized how India acted as a secure refuge, celebrating the profound ancient values of <em>'Vasudhaiva Kutumbakam'</em> (The World is One Family).`;
        } else {
            finalTxt.innerHTML = `You finished with <strong>${accumulatedScore} Harmony Points</strong>. Review the choices to fully understand how integration, adaptation, and mutual respect preserved these distinct cultures over generations.`;
        }
    }

    function resetDecisionTree() {
        initTreeStructure();
    }
</script>
</body>
</html>
